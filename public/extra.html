<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Extras | UNIO</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
  --blue: #0057ff;
  --blue-dark: #0033cc;
  --blue-light: #eff6ff;
  --bg: #f0f4ff;
  --white: #ffffff;
  --text: #0f172a;
  --muted: #94a3b8;
  --border: #f1f5f9;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  padding-bottom: 30px;
  overflow-x: hidden;
}
.header {
  background: var(--white);
  padding: 1rem 1.25rem;
  display: flex;
  align-items: center;
  gap: 1rem;
  box-shadow: 0 1px 0 var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}
.back-btn { font-size: 1.2rem; color: var(--text); text-decoration: none; }
.header-logo { font-size: 1.2rem; font-weight: 800; color: var(--text); }
.container { max-width: 480px; margin: 0 auto; padding: 1.25rem; }
.section-label {
  font-size: .65rem; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: .1em;
  margin-bottom: 1rem; padding-left: .25rem;
}
.options-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.75rem; }
.option-card {
  background: var(--white); border-radius: 1.25rem; padding: 1rem 0.5rem;
  text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  border: 1px solid var(--border); text-decoration: none;
  display: flex; flex-direction: column; align-items: center; transition: transform 0.15s;
}
.option-card:active { transform: scale(0.93); }
.icon-box {
  width: 48px; height: 48px; border-radius: 1.1rem;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 0.6rem; font-size: 1.2rem;
}
.option-label {
  font-size: 0.58rem; font-weight: 800; color: #64748b;
  text-transform: uppercase; letter-spacing: 0.03em; line-height: 1.2;
}
.bg-blue   { background: #eff6ff; color: #0057ff; }
.bg-purple { background: #fdf4ff; color: #9333ea; }
.bg-orange { background: #fff7ed; color: #ea580c; }
.bg-cyan   { background: #ecfeff; color: #0891b2; }
.bg-green  { background: #f0fdf4; color: #16a34a; }
.bg-gray   { background: #f8fafc; color: #94a3b8; }
.bg-pink   { background: #fff1f2; color: #e11d48; }
.bg-indigo { background: #eef2ff; color: #4f46e5; }
.coming-soon { opacity: 0.6; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(15px); }
  to   { opacity: 1; transform: translateY(0); }
}
.fade-up { opacity: 0; animation: fadeUp 0.4s ease forwards; }
</style>
</head>
<body>

<div class="header">
