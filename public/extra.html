<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extra - UNIO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #e0f2fe 0%, #ffffff 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            width: 100%;
            max-width: 400px; /* Mobile focused width */
        }

        .icon-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 1 line me 4 icons */
            gap: 12px;
        }

        /* Glassmorphic Style */
        .icon-item {
            aspect-ratio: 1 / 1;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 162, 255, 0.1);
        }

        .icon-item:active {
            transform: scale(0.9);
            background: rgba(255, 255, 255, 0.6);
        }

        /* Sky Blue Icon Color */
        .icon-item i {
            font-size: 24px;
            color: #0ea5e9; /* Sky Blue */
            filter: drop-shadow(0 2px 4px rgba(14, 165, 233, 0.3));
        }

        /* Empty/Placeholder Style */
        .empty-slot {
            background: rgba(255, 255, 255, 0.15);
            border: 1px dashed rgba(14, 165, 233, 0.2);
            box-shadow: none;
        }

        h2 {
            color: #0369a1;
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>DASHBOARD</h2>
    
    <div class="icon-grid">
        <a href="keeper.html" class="icon-item">
            <i class="fa-solid fa-shield-halved"></i>
        </a>

        <div class="icon-item empty-slot"></div>
        <div class="icon-item empty-slot"></div>
        <div class="icon-item empty-slot"></div>
        <div class="icon-item empty-slot"></div>
        <div class="icon-item empty-slot"></div>
        <div class="icon-item empty-slot"></div>
        <div class="icon-item empty-slot"></div>
        <div class="icon-item empty-slot"></div>
        <div class="icon-item empty-slot"></div>
        <div class="icon-item empty-slot"></div>
        <div class="icon-item empty-slot"></div>
        <div class="icon-item empty-slot"></div>
        <div class="icon-item empty-slot"></div>
        <div class="icon-item empty-slot"></div>
        <div class="icon-item empty-slot"></div>
        <div class="icon-item empty-slot"></div>
        <div class="icon-item empty-slot"></div>
        <div class="icon-item empty-slot"></div>
        <div class="icon-item empty-slot"></div>
    </div>
</div>

</body>
</html>
