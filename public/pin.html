<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify PIN — UNIO</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{
  --blue:#0057ff;--blue-dark:#0041cc;--blue-light:#e8efff;
  --green:#16a34a;--red:#dc2626;
  --gray-50:#f9fafb;--gray-100:#f3f4f6;--gray-200:#e5e7eb;
  --gray-400:#9ca3af;--gray-600:#4b5563;--gray-900:#111827;
  --purple:#7c3aed;--white:#ffffff;
  --shadow:0 24px 60px rgba(0,87,255,.10);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;min-height:100vh;background:#eef2ff;display:flex;align-items:center;justify-content:center;padding:16px;position:relative;overflow:hidden}
body::before{content:'';position:fixed;top:-10%;left:-10%;width:40%;height:40%;background:radial-gradient(circle,rgba(0,87,255,.08),transparent 70%);pointer-events:none}

.card{background:var(--white);border-radius:2.5rem;padding:2.5rem 2rem;width:100%;max-width:400px;box-shadow:var(--shadow);text-align:center;position:relative;z-index:1;animation:popIn .5s cubic-bezier(.34,1.56,.64,1)}
@keyframes popIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}

.icon-box{width:72px;height:72px;background:linear-gradient(135deg,var(--blue),#4d8aff);border-radius:1.5rem;display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem;color:white;font-size:1.8rem;box-shadow:0 10px 25px rgba(0,87,255,.25)}
.card h2{font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800;color:var(--gray-900);margin-bottom:.5rem}
.card p{font-size:.85rem;color:var(--gray-400);font-weight:500;margin-bottom:1.5rem}

.pin-display{display:flex;gap:.8rem;justify-content:center;margin-bottom:2rem}
.pin-dot{width:56px;height:56px;border-radius:1.1rem;background:var(--gray-50);border:2.5px solid var(--gray-200);transition:all .2s;position:relative}
.pin-dot.filled{border-color:var(--blue);background:var(--blue-light);transform:scale(1.05)}
.pin-dot.filled::after{content:'';position:absolute;width:14px;height:14px;background:var(--blue);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%)}

.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:.7rem;max-width:300px;margin:0 auto 1.5rem}
.key{padding:1.1rem;background:var(--white);border:2px solid var(--gray-100);border-radius:1.2rem;font-size:1.3rem;font-weight:700;cursor:pointer;transition:all .15s;color:var(--gray-900)}
.key:active{background:var(--gray-100);transform:scale(.92)}
.key.del{color:var(--red)}
.key.go{background:var(--blue);color:white;border-color:var(--blue)}

.action-btns{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
.act-btn{padding:.8rem;background:var(--gray-50);border:2px solid var(--gray-100);border-radius:.9rem;font-size:.75rem;font-weight:700;color:var(--gray-600);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.5rem;transition:all .2s}
.act-btn:hover{background:var(--white);border-color:var(--blue);color:var(--blue)}

/* MODALS */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(8px);z-index:100;display:none;align-items:center;justify-content:center;padding:16px}
.overlay.open{display:flex}
.modal{background:white;border-radius:2rem;padding:2rem;width:100%;max-width:380px;position:relative;animation:modalIn .3s ease-out}
@keyframes modalIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.modal-close{position:absolute;top:1.2rem;right:1.2rem;width:32px;height:32px;border-radius:50%;background:var(--gray-100);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center}
.m-icon{width:56px;height:56px;border-radius:1.2rem;display:flex;align-items:center;justify-content:center;font-size:1.4rem;margin-bottom:1rem}
.m-icon.blue{background:var(--blue-light);color:var(--blue)}
.m-title{font-family:'Syne',sans-serif;font-size:1.25rem;font-weight:800;margin-bottom:.5rem}
.m-sub{font-size:.8rem;color:var(--gray-400);margin-bottom:1.25rem;line-height:1.4}

.input-group{margin-bottom:1rem;text-align:left}
.input-group label{display:block;font-size:.65rem;font-weight:800;text-transform:uppercase;color:var(--gray-400);margin-bottom:.4rem;margin-left:.3rem}
.input-group input{width:100%;padding:.9rem 1.1rem;background:var(--gray-50);border:2px solid var(--gray-200);border-radius:1rem;font-weight:600;outline:none}
.input-group input:focus{border-color:var(--blue);background:white}

.btn{width:100%;padding:1rem;background:var(--blue);color:white;border:none;border-radius:1rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.6rem}
.btn:disabled{background:var(--gray-400)}
.spinner{width:18px;height:18px;border:3px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .8s linear infinite;display:none}
.btn.loading .spinner{display:block}
.btn.loading span:not(.spinner){display:none}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="card">
  <div class="icon-box"><i class="fa-solid fa-shield-halved"></i></div>
  <h2>Secure Access</h2>
  <p>Enter your 4-digit security PIN</p>

  <div class="pin-display">
    <div class="pin-dot" id="dot-0"></div>
    <div class="pin-dot" id="dot-1"></div>
    <div class="pin-dot" id="dot-2"></div>
    <div class="pin-dot" id="dot-3"></div>
  </div>

  <div class="keypad">
    <div class="key" onclick="press('1')">1</div>
    <div class="key" onclick="press('2')">2</div>
    <div class="key" onclick="press('3')">3</div>
    <div class="key" onclick="press('4')">4</div>
    <div class="key" onclick="press('5')">5</div>
    <div class="key" onclick="press('6')">6</div>
    <div class="key" onclick="press('7')">7</div>
    <div class="key" onclick="press('8')">8</div>
    <div class="key" onclick="press('9')">9</div>
    <div class="key del" onclick="del()"><i class="fa-solid fa-delete-left"></i></div>
    <div class="key" onclick="press('0')">0</div>
    <div class="key go" onclick="verify()"><i class="fa-solid fa-arrow-right"></i></div>
  </div>

  <div class="action-btns">
    <div class="act-btn" onclick="openModal('forgot-overlay')">
      <i class="fa-solid fa-key"></i> Forgot PIN
    </div>
    <div class="act-btn" onclick="openModal('change-overlay')">
      <i class="fa-solid fa-pen-to-square"></i> Change
    </div>
  </div>
</div>

<div class="overlay" id="forgot-overlay">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('forgot-overlay')"><i class="fa-solid fa-xmark"></i></button>
    <div class="m-icon blue"><i class="fa-solid fa-mobile-screen"></i></div>
    <div class="m-title">Forgot PIN?</div>
    <div class="m-sub">Enter your registered mobile number to receive a reset OTP.</div>
    <div class="input-group">
      <label>Mobile Number</label>
      <input type="number" id="f-mobile" placeholder="Enter mobile number">
    </div>
    <button class="btn" id="f-btn" onclick="sendResetOTP()">
      <div class="spinner"></div>
      <span>Send OTP</span>
    </button>
  </div>
</div>

<div class="overlay" id="change-overlay">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('change-overlay')"><i class="fa-solid fa-xmark"></i></button>
    <div class="m-icon blue"><i class="fa-solid fa-lock-open"></i></div>
    <div class="m-title">Change PIN</div>
    <div class="m-sub">Please enter your current account password to set a new PIN.</div>
    <div class="input-group">
      <label>Current Password</label>
      <input type="password" id="c-pass" placeholder="Enter password">
    </div>
    <button class="btn" onclick="verifyPass()">Continue</button>
  </div>
</div>

<script>
let code = "";

function press(n) {
  if(code.length < 4) {
    code += n;
    update();
  }
}

function del() {
  code = code.slice(0, -1);
  update();
}

function update() {
  for(let i=0; i<4; i++) {
    document.getElementById(`dot-${i}`).classList.toggle('filled', i < code.length);
  }
}

function verify() {
  if(code.length < 4) return alert("Please enter 4 digits");
  
  // Simulation check
  if(code === "1234") { 
    alert("Access Granted!");
    window.location.href = "dashboard.html";
  } else {
    alert("Invalid PIN. Try again.");
    code = "";
    update();
  }
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

async function sendResetOTP() {
  const m = document.getElementById('f-mobile').value;
  if(!m) return alert("Mobile number enter karein");
  
  const b = document.getElementById('f-btn');
  b.classList.add('loading');
  b.disabled = true;

  setTimeout(() => {
    b.classList.remove('loading');
    alert("OTP Sent to @OTP_UNIO_BOT");
    closeModal('forgot-overlay');
  }, 1500);
}

function verifyPass() {
  const p = document.getElementById('c-pass').value;
  if(!p) return alert("Password enter karein");
  alert("Password verified. Ab naya PIN set karein.");
  closeModal('change-overlay');
}
</script>

</body>
</html>
