<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gift Code | UNIO</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        /* [Keeping your original styles here - No changes needed to CSS] */
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        body{font-family:'Plus Jakarta Sans',sans-serif;background:#f0f4ff;min-height:100vh;padding-bottom:80px;overflow-x:hidden}
        .header{background:white;padding:1rem 1.25rem;display:flex;align-items:center;gap:1rem;box-shadow:0 2px 10px rgba(0,0,0,.05);position:sticky;top:0;z-index:40}
        .back{width:36px;height:36px;background:#f8fafc;border-radius:50%;display:flex;align-items:center;justify-content:center;text-decoration:none;color:#64748b;flex-shrink:0}
        .header h1{font-size:1rem;font-weight:800;color:#0f172a;text-transform:uppercase;letter-spacing:.05em}
        .tabs{display:flex;background:white;border-radius:1rem;padding:4px;margin:1.25rem;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .tab{flex:1;padding:.7rem;text-align:center;font-weight:700;font-size:.75rem;border-radius:.75rem;cursor:pointer;color:#94a3b8;text-transform:uppercase;border:none;background:none;font-family:inherit;transition:all .2s}
        .tab.active{background:#0057ff;color:white;box-shadow:0 4px 12px rgba(0,87,255,.3)}
        .tab-section{display:none}.tab-section.active{display:block}
        .container{max-width:480px;margin:0 auto;padding:0 1.25rem}
        .bal-card{background:linear-gradient(135deg,#0057ff,#0033cc);border-radius:1.75rem;padding:1.5rem;color:white;margin-bottom:1.25rem;position:relative;overflow:hidden}
        .bal-z{position:relative;z-index:1}
        .bal-label{font-size:.6rem;font-weight:700;opacity:.7;text-transform:uppercase;letter-spacing:.12em;margin-bottom:.35rem}
        .bal-amount{font-size:2.25rem;font-weight:900;letter-spacing:-1px}
        .card{background:white;border-radius:1.75rem;padding:1.5rem;box-shadow:0 2px 10px rgba(0,0,0,.05);margin-bottom:1.25rem}
        .card-title{font-size:.7rem;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:.06em;margin-bottom:1.1rem;display:flex;align-items:center;gap:.5rem}
        .inp-group{margin-bottom:1rem}
        .inp-group label{display:block;font-size:.7rem;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.5rem;margin-left:.25rem}
        .inp-group input{width:100%;padding:1rem 1.25rem;background:#f8fafc;border:2px solid #f1f5f9;border-radius:1rem;font-size:.9rem;font-weight:600;outline:none;font-family:inherit;transition:all .2s;color:#0f172a}
        .inp-group input:focus{border-color:#0057ff;background:white}
        .summary{background:#f0f4ff;border-radius:1rem;padding:.9rem 1.1rem;margin-bottom:1.1rem;display:none}
        .summary.show{display:block}
        .summary-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:.35rem}
        .summary-val{font-size:.75rem;font-weight:800;color:#0f172a}
        .summary-total{color:#dc2626;font-size:.85rem;font-weight:900}
        .btn{width:100%;padding:1rem;background:#0057ff;color:white;border:none;border-radius:1rem;font-size:.85rem;font-weight:800;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.5rem}
        .btn:disabled{background:#94a3b8}
        .btn.green{background:linear-gradient(135deg,#16a34a,#059669)}
        .btn.purple{background:linear-gradient(135deg,#7c3aed,#0057ff)}
        .msg{padding:.75rem 1rem;border-radius:.75rem;font-size:.75rem;font-weight:700;text-align:center;margin-bottom:1rem;display:none}
        .msg.error{background:#fee2e2;color:#dc2626;display:block}
        .msg.success{background:#dcfce7;color:#16a34a;display:block}
        .code-result{background:linear-gradient(135deg,#7c3aed,#0057ff);border-radius:1.75rem;padding:1.5rem;color:white;margin-bottom:1.25rem;text-align:center;display:none}
        .code-result.show{display:block}
        .code-big{font-size:3rem;font-weight:900;letter-spacing:.25em;margin-bottom:.75rem}
        .code-copy-btn{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);color:white;padding:.6rem 1.25rem;border-radius:.75rem;font-size:.75rem;font-weight:800;cursor:pointer}
        .no-codes{text-align:center;padding:3rem 1rem;color:#94a3b8}
        .claim-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:none;align-items:center;justify-content:center;flex-direction:column;backdrop-filter:blur(8px)}
        .claim-overlay.show{display:flex}
        .claim-amt-big{font-size:3.5rem;font-weight:900;color:white}
        .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid #f1f5f9;display:flex;justify-content:space-around;padding:.6rem 0;z-index:50}
        .nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;color:#94a3b8;font-size:.6rem;font-weight:700;text-decoration:none;flex:1}
        .nav-item.active{color:#0057ff}
    </style>
</head>
<body>

<div class="header">
    <a href="dashboard.html" class="back"><i class="fa-solid fa-arrow-left"></i></a>
    <h1>🎁 Gift Code</h1>
</div>

<div class="tabs">
    <button class="tab active" onclick="switchTab('create', this)"><i class="fa-solid fa-plus"></i> Create</button>
    <button class="tab" onclick="switchTab('claim', this)"><i class="fa-solid fa-gift"></i> Claim</button>
    <button class="tab" onclick="switchTab('track', this)"><i class="fa-solid fa-chart-bar"></i> Tracking</button>
    <button class="tab" onclick="switchTab('history', this)"><i class="fa-solid fa-clock-rotate-left"></i> History</button>
</div>

<div class="container">
    <!-- CREATE TAB -->
    <div id="tab-create" class="tab-section active">
        <div class="bal-card">
            <div class="bal-z">
                <div class="bal-label">Your Balance</div>
                <div class="bal-amount">₹<span id="balance">0.00</span></div>
            </div>
        </div>
        <div class="card">
            <div id="create-msg" class="msg"></div>
            <div class="inp-group">
                <label>Total Users</label>
                <input type="number" id="total-users" placeholder="e.g. 10" oninput="updateSummary()">
            </div>
            <div class="inp-group">
                <label>Amount Per User (₹)</label>
                <input type="number" id="per-amount" placeholder="e.g. 5.00" oninput="updateSummary()">
            </div>
            <div class="inp-group">
                <label>Comment</label>
                <input type="text" id="comment" placeholder="Optional">
            </div>
            <div class="summary" id="summary">
                <div class="summary-row"><span>Total Deduction:</span> <span id="s-total" class="summary-total">₹0.00</span></div>
            </div>
            <button class="btn purple" id="create-btn" onclick="createCode()">Create Gift Code</button>
        </div>
        <div class="code-result" id="code-result">
            <div class="code-big" id="result-code">00000</div>
            <button class="code-copy-btn" onclick="copyCode()">Copy Code</button>
        </div>
    </div>

    <!-- CLAIM TAB -->
    <div id="tab-claim" class="tab-section">
        <div class="card">
            <div id="claim-msg" class="msg"></div>
            <div class="inp-group">
                <label>5-Digit Code</label>
                <input type="text" id="claim-code-input" maxlength="5" style="text-align:center; font-size: 2rem;">
            </div>
            <button class="btn green" id="claim-btn" onclick="claimCode()">Claim Now</button>
        </div>
    </div>

    <!-- TRACK & HISTORY TABS -->
    <div id="tab-track" class="tab-section"><div id="track-list" class="no-codes">No codes created yet.</div></div>
    <div id="tab-history" class="tab-section"><div id="history-list" class="no-codes">No claims yet.</div></div>
</div>

<!-- Success Overlay -->
<div class="claim-overlay" id="claim-overlay">
    <div class="claim-amt-big" id="anim-amt">₹0.00</div>
    <p style="color:white; margin: 10px 0;">Claimed Successfully!</p>
    <button class="btn" style="width:auto; padding: 10px 30px;" onclick="closeAnim()">Close</button>
</div>

<script>
    const API = 'https://your-api-url.com/api'; // <--- APNI API URL YAHA DALO
    const token = localStorage.getItem('token');

    // 1. Initial Load
    window.onload = () => {
        if(!token) window.location.href = 'index.html';
        fetchBalance();
    };

    // 2. Fetch Balance
    async function fetchBalance() {
        try {
            const r = await fetch(API + '/wallet/balance', { headers: {'Authorization': 'Bearer ' + token} });
            const d = await r.json();
            if(d.status === 'success') document.getElementById('balance').textContent = parseFloat(d.balance).toFixed(2);
        } catch(e) { console.error("Balance fetch error"); }
    }

    // 3. Tab Switching Logic
    function switchTab(tab, el) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-section').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('tab-' + tab).classList.add('active');
        
        if(tab === 'track') loadData('track-list', '/giftcode/my-codes');
        if(tab === 'history') loadData('history-list', '/giftcode/my-history');
    }

    // 4. Create Logic
    function updateSummary() {
        const u = document.getElementById('total-users').value || 0;
        const a = document.getElementById('per-amount').value || 0;
        const total = (u * a).toFixed(2);
        document.getElementById('s-total').textContent = '₹' + total;
        document.getElementById('summary').style.display = (u > 0 && a > 0) ? 'block' : 'none';
    }

    async function createCode() {
        const btn = document.getElementById('create-btn');
        const payload = {
            total_users: document.getElementById('total-users').value,
            per_user_amount: document.getElementById('per-amount').value,
            comment: document.getElementById('comment').value
        };

        btn.disabled = true;
        try {
            const r = await fetch(API + '/giftcode/create', {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token},
                body: JSON.stringify(payload)
            });
            const d = await r.json();
            if(d.status === 'success') {
                document.getElementById('result-code').textContent = d.code;
                document.getElementById('code-result').classList.add('show');
                fetchBalance();
                showMsg('create-msg', 'Code Created!', 'success');
            } else {
                showMsg('create-msg', d.message, 'error');
            }
        } catch(e) { showMsg('create-msg', 'Server Error', 'error'); }
        btn.disabled = false;
    }

    // 5. Claim Logic
    async function claimCode() {
        const code = document.getElementById('claim-code-input').value;
        if(code.length < 5) return showMsg('claim-msg', 'Invalid Code', 'error');

        try {
            const r = await fetch(API + '/giftcode/claim', {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token},
                body: JSON.stringify({ code })
            });
            const d = await r.json();
            if(d.status === 'success') {
                document.getElementById('anim-amt').textContent = '₹' + d.amount;
                document.getElementById('claim-overlay').classList.add('show');
                fetchBalance();
            } else {
                showMsg('claim-msg', d.message, 'error');
            }
        } catch(e) { showMsg('claim-msg', 'Failed to claim', 'error'); }
    }

    // 6. Helper Functions
    function showMsg(id, txt, type) {
        const m = document.getElementById(id);
        m.textContent = txt;
        m.className = 'msg ' + type;
        setTimeout(() => m.style.display = 'none', 3000);
    }

    function closeAnim() { document.getElementById('claim-overlay').classList.remove('show'); }

    function copyCode() {
        const c = document.getElementById('result-code').textContent;
        navigator.clipboard.writeText(c);
        alert("Code Copied!");
    }

    async function loadData(targetId, endpoint) {
        const div = document.getElementById(targetId);
        div.innerHTML = "Loading...";
        try {
            const r = await fetch(API + endpoint, { headers: {'Authorization': 'Bearer ' + token} });
            const d = await r.json();
            // Yaha aap apne data loop karke HTML generate kar sakte hain
            div.innerHTML = d.data && d.data.length ? "Data found (Logic pending loop)" : "No records found.";
        } catch(e) { div.innerHTML = "Error loading data."; }
    }
</script>
</body>
</html>
