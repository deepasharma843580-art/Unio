<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>UPI Payment</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 50px;
      background: #0f0f0f;
      color: #fff;
    }
    input {
      padding: 10px;
      width: 200px;
      font-size: 16px;
      margin: 10px;
    }
    button {
      padding: 12px 20px;
      font-size: 18px;
      background: #00c853;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h2>Pay via UPI</h2>

  <input type="number" id="amount" placeholder="Enter Amount" />
  <br>

  <button onclick="payUPI()">Pay Now</button>

  <script>
    function payUPI() {
      let amount = document.getElementById("amount").value;

      if (!amount || amount <= 0) {
        alert("Enter valid amount");
        return;
      }

      // NPCI UPI Deep Link
      let upiLink = `upi://pay?pa=9302369504@fam&pn=Sumit%20Sharma&am=${amount}&cu=INR`;

      window.location.href = upiLink;
    }
  </script>

</body>
</html>
