<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UPI Payment Gateway - UNIO</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --card: #111118;
    --border: #1e1e2e;
    --accent: #6c63ff;
    --accent2: #00d4aa;
    --text: #f0f0ff;
    --muted: #6b6b8a;
    --success: #00d4aa;
    --danger: #ff4d6d;
    --glow: rgba(108,99,255,0.25);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Sora', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  /* Fixed Background Loading Issue */
  body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(ellipse at 30% 20%, rgba(108,99,255,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(0,212,170,0.06) 0%, transparent 50%);
    pointer-events: none;
    z-index: -1; /* Make sure background is behind */
  }

  .container {
    width: 100%;
    max-width: 420px;
    position: relative;
    z-index: 10;
  }

  .header {
    text-align: center;
    margin-bottom: 28px;
  }

  .header .logo-ring {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 14px;
    font-size: 28px;
    box-shadow: 0 0 30px var(--glow);
  }

  .header h1 {
    font-size: 22px;
    font-weight: 700;
  }

  .header p {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 24px;
    position: relative;
    overflow: hidden;
  }

  .upi-info {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #0d0d16;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    margin-bottom: 20px;
  }

  .upi-info-left { display: flex; align-items: center; gap: 10px; }
  .upi-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent2); }

  .upi-info-text .label { color: var(--muted); font-size: 10px; text-transform: uppercase; }
  .upi-info-text .value { color: var(--text); font-weight: 600; font-family: 'JetBrains Mono', monospace; font-size: 12px; }

  .secure-badge { font-size: 10px; color: var(--accent2); font-weight: 600; }

  .amount-section { margin-bottom: 24px; }
  .amount-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; display: block; }

  .amount-wrapper {
    display: flex;
    align-items: center;
    background: #0d0d16;
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 12px 18px;
  }

  .rupee-symbol { font-size: 24px; color: var(--accent2); margin-right: 10px; font-family: 'JetBrains Mono'; }
  .amount-input { flex: 1; background: none; border: none; outline: none; font-size: 26px; color: var(--text); font-family: 'JetBrains Mono'; width: 100%; }

  .quick-amounts { display: flex; gap: 6px; margin-top: 12px; flex-wrap: wrap; }
  .quick-btn { background: #0d0d16; border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; font-size: 11px; color: var(--muted); cursor: pointer; }

  .apps-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr); /* 4 columns for Navi */
    gap: 8px;
    margin-bottom: 20px;
  }

  .app-btn {
    background: #0d0d16;
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 12px 5px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    text-decoration: none;
  }

  .app-icon {
    width: 35px;
    height: 35px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: bold;
    color: white;
  }

  .app-name { font-size: 9px; font-weight: 600; color: var(--text); text-align: center; }

  /* App Specific Colors */
  .icon-gpay { background: #4285f4; }
  .icon-phonepe { background: #6327b1; }
  .icon-paytm { background: #00b5ea; }
  .icon-navi { background: #00d4aa; } /* Navi Brand Color */
  .icon-bhim { background: #ff9900; }
  .icon-amazon { background: #232f3e; }
  .icon-whatsapp { background: #25d366; }

  .pay-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--accent), #8b7cf8);
    border: none;
    border-radius: 14px;
    color: white;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
  }

  .error-msg { color: var(--danger); font-size: 11px; margin-top: 8px; display: none; }
  .footer { text-align: center; margin-top: 16px; font-size: 11px; color: var(--muted); }
  .footer span { color: var(--accent2); }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="logo-ring">💳</div>
    <h1>Secure Payment</h1>
    <p>UNIO Wallet Checkout</p>
  </div>

  <div class="card">
    <div class="upi-info">
      <div class="upi-info-left">
        <div class="upi-dot"></div>
        <div class="upi-info-text">
          <div class="label">Paying To</div>
          <div class="value">sumit302010@fam</div>
        </div>
      </div>
      <div class="secure-badge">🔒 Secure</div>
    </div>

    <div class="amount-section">
      <span class="amount-label">Enter Amount</span>
      <div class="amount-wrapper">
        <span class="rupee-symbol">₹</span>
        <input type="number" class="amount-input" id="amountInput" placeholder="0" />
      </div>
      <div class="error-msg" id="errorMsg">⚠️ Please enter a valid amount</div>
      <div class="quick-amounts">
        <button class="quick-btn" onclick="setAmount(10)">₹10</button>
        <button class="quick-btn" onclick="setAmount(50)">₹50</button>
        <button class="quick-btn" onclick="setAmount(100)">₹100</button>
        <button class="quick-btn" onclick="setAmount(500)">₹500</button>
      </div>
    </div>

    <div class="apps-grid">
      <div class="app-btn" onclick="payWithApp('gpay')">
        <div class="app-icon icon-gpay">G</div>
        <span class="app-name">GPay</span>
      </div>
      <div class="app-btn" onclick="payWithApp('phonepe')">
        <div class="app-icon icon-phonepe">P</div>
        <span class="app-name">PhonePe</span>
      </div>
      <div class="app-btn" onclick="payWithApp('paytm')">
        <div class="app-icon icon-paytm">Py</div>
        <span class="app-name">Paytm</span>
      </div>
      <div class="app-btn" onclick="payWithApp('navi')">
        <div class="app-icon icon-navi">N</div>
        <span class="app-name">Navi</span>
      </div>
      <div class="app-btn" onclick="payWithApp('bhim')">
        <div class="app-icon icon-bhim">B</div>
        <span class="app-name">BHIM</span>
      </div>
      <div class="app-btn" onclick="payWithApp('amazon')">
        <div class="app-icon icon-amazon">A</div>
        <span class="app-name">Amazon</span>
      </div>
      <div class="app-btn" onclick="payWithApp('whatsapp')">
        <div class="app-icon icon-whatsapp">W</div>
        <span class="app-name">WhatsApp</span>
      </div>
    </div>

    <button class="pay-btn" onclick="payWithApp('any')">⚡ Pay Now</button>
  </div>

  <div class="footer">Powered by <span>UNIO</span> · Safe & Secure</div>
</div>

<script>
  const UPI_ID = 'sumit302010@fam';
  const MERCHANT_NAME = 'Sumit';

  function setAmount(val) {
    document.getElementById('amountInput').value = val;
    document.getElementById('errorMsg').style.display = 'none';
  }

  function payWithApp(app) {
    const amt = document.getElementById('amountInput').value;
    if (!amt || amt <= 0) {
      document.getElementById('errorMsg').style.display = 'block';
      return;
    }
    
    // UPI Intent URL
    const upiUrl = `upi://pay?pa=${UPI_ID}&pn=${encodeURIComponent(MERCHANT_NAME)}&am=${amt}&cu=INR&tn=UNIO_Payment`;
    
    window.location.href = upiUrl;

    // Redirection logic to success/verify page after 3 seconds
    setTimeout(() => {
      window.location.href = "verify.html"; 
    }, 3000);
  }
</script>

</body>
</html>
