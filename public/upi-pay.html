<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UPI Payment Gateway</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --card: #111118;
    --border: #1e1e2e;
    --accent: #6c63ff;
    --accent2: #00d4aa;
    --text: #f0f0ff;
    --muted: #6b6b8a;
    --success: #00d4aa;
    --danger: #ff4d6d;
    --glow: rgba(108,99,255,0.25);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Sora', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    overflow-x: hidden;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 30% 20%, rgba(108,99,255,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(0,212,170,0.06) 0%, transparent 50%);
    animation: bgPulse 8s ease-in-out infinite alternate;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes bgPulse {
    0% { transform: scale(1) rotate(0deg); }
    100% { transform: scale(1.1) rotate(3deg); }
  }

  .container {
    width: 100%;
    max-width: 420px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 28px;
    animation: slideDown 0.6s ease;
  }

  .header .logo-ring {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 14px;
    font-size: 28px;
    box-shadow: 0 0 30px var(--glow);
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-6px); }
  }

  .header h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .header p {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* Card */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 28px;
    animation: slideUp 0.6s ease;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.6;
  }

  @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  /* Amount Input */
  .amount-section {
    margin-bottom: 24px;
  }

  .amount-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 10px;
    display: block;
  }

  .amount-wrapper {
    display: flex;
    align-items: center;
    background: #0d0d16;
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 14px 18px;
    transition: border-color 0.3s, box-shadow 0.3s;
  }

  .amount-wrapper:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--glow);
  }

  .rupee-symbol {
    font-size: 24px;
    font-weight: 600;
    color: var(--accent2);
    margin-right: 10px;
    font-family: 'JetBrains Mono', monospace;
  }

  .amount-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    width: 100%;
  }

  .amount-input::placeholder { color: #2a2a3e; }

  /* Quick amounts */
  .quick-amounts {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    flex-wrap: wrap;
  }

  .quick-btn {
    background: #0d0d16;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 5px 12px;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    font-family: 'Sora', sans-serif;
    transition: all 0.2s;
  }

  .quick-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 20px 0;
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* UPI Apps Grid */
  .apps-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 14px;
    display: block;
  }

  .apps-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }

  .app-btn {
    background: #0d0d16;
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 16px 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    transition: all 0.25s;
    text-decoration: none;
    font-family: 'Sora', sans-serif;
    position: relative;
    overflow: hidden;
  }

  .app-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.3s;
    border-radius: 14px;
  }

  .app-btn:hover { transform: translateY(-3px); }

  .app-btn.gpay { border-color: rgba(66,133,244,0.3); }
  .app-btn.gpay:hover { border-color: #4285f4; box-shadow: 0 8px 24px rgba(66,133,244,0.2); }

  .app-btn.phonepe { border-color: rgba(99,39,177,0.3); }
  .app-btn.phonepe:hover { border-color: #6327b1; box-shadow: 0 8px 24px rgba(99,39,177,0.2); }

  .app-btn.paytm { border-color: rgba(0,181,234,0.3); }
  .app-btn.paytm:hover { border-color: #00b5ea; box-shadow: 0 8px 24px rgba(0,181,234,0.2); }

  .app-btn.bhim { border-color: rgba(255,153,0,0.3); }
  .app-btn.bhim:hover { border-color: #ff9900; box-shadow: 0 8px 24px rgba(255,153,0,0.2); }

  .app-btn.amazonpay { border-color: rgba(255,153,0,0.3); }
  .app-btn.amazonpay:hover { border-color: #ff9900; box-shadow: 0 8px 24px rgba(255,153,0,0.2); }

  .app-btn.whatsapp { border-color: rgba(37,211,102,0.3); }
  .app-btn.whatsapp:hover { border-color: #25d366; box-shadow: 0 8px 24px rgba(37,211,102,0.2); }

  .app-icon {
    width: 42px;
    height: 42px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
  }

  .app-name {
    font-size: 11px;
    font-weight: 600;
    color: var(--text);
    text-align: center;
  }

  /* GPay icon */
  .icon-gpay { background: linear-gradient(135deg, #4285f4 0%, #34a853 50%, #fbbc04 75%, #ea4335 100%); }
  .icon-phonepe { background: linear-gradient(135deg, #6327b1, #9b59b6); }
  .icon-paytm { background: linear-gradient(135deg, #00b5ea, #0070ba); }
  .icon-bhim { background: linear-gradient(135deg, #ff9900, #e65c00); }
  .icon-amazon { background: linear-gradient(135deg, #ff9900, #232f3e); }
  .icon-whatsapp { background: linear-gradient(135deg, #25d366, #128c7e); }

  /* Pay button */
  .pay-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--accent), #8b7cf8);
    border: none;
    border-radius: 14px;
    color: white;
    font-size: 15px;
    font-weight: 700;
    font-family: 'Sora', sans-serif;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }

  .pay-btn::before {
    content: '';
    position: absolute;
    top: -50%; left: -60%;
    width: 40%; height: 200%;
    background: rgba(255,255,255,0.15);
    transform: skewX(-20deg);
    transition: left 0.5s;
  }
