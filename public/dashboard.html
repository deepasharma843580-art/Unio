<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>UNIO | Professional Fintech</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
    --primary: #0052ff;
    --primary-dark: #003eb3;
    --bg: #f4f7fe;
    --card-bg: #ffffff;
    --text-main: #0f172a;
    --text-muted: #64748b;
    --success: #10b981;
    --danger: #ef4444;
    --border: #eef2f6;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text-main); padding-bottom: 100px; }

/* ── Header ── */
.header {
    background: var(--white); padding: 1.2rem 1.5rem; display: flex;
    justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100;
}
.header-logo { font-size: 1.6rem; font-weight: 900; color: var(--primary); font-style: italic; }

/* ── Balance Card ── */
.balance-card {
    background: linear-gradient(135deg, #0052ff 0%, #002db3 100%);
    margin: 1rem 1.2rem; border-radius: 28px; padding: 1.8rem; color: white;
    box-shadow: 0 15px 35px rgba(0, 82, 255, 0.2); position: relative;
}
.bal-header { display: flex; justify-content: space-between; align-items: center; }
.menu-trigger {
    background: rgba(255, 255, 255, 0.2); border: none; padding: 8px 16px;
    border-radius: 12px; color: white; font-weight: 700; font-size: 0.75rem;
    cursor: pointer; backdrop-filter: blur(10px); display: flex; align-items: center; gap: 6px;
}
.bal-amount { font-size: 2.8rem; font-weight: 800; margin: 1rem 0; letter-spacing: -1px; }

/* ── Quick Actions Grid ── */
.actions-container {
    background: white; border-radius: 24px; margin: 0 1.2rem 1.5rem;
    padding: 1.2rem; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
}
.action-item {
    text-align: center; text-decoration: none; display: flex; flex-direction: column; align-items: center;
}
.icon-box {
    width: 50px; height: 50px; border-radius: 16px; display: flex; 
    align-items: center; justify-content: center; font-size: 1.2rem; margin-bottom: 6px;
    transition: 0.3s;
}
.action-item span { font-size: 0.65rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }

/* ── Service Section ── */
.section-label { padding: 0 1.5rem; font-size: 0.85rem; font-weight: 800; margin-bottom: 0.8rem; color: var(--text-main); }
.service-row { display: flex; gap: 12px; overflow-x: auto; padding: 0 1.5rem 1.5rem; scrollbar-width: none; }
.service-card {
    min-width: 100px; background: white; padding: 1rem; border-radius: 20px;
    text-align: center; border: 1px solid var(--border);
}

/* ── Transactions ── */
.txn-list { background: white; margin: 0 1.2rem; border-radius: 24px; overflow: hidden; border: 1px solid var(--border); }
.txn-item {
    display: flex; align-items: center; padding: 1.1rem 1.2rem; border-bottom: 1px solid #f8fafc;
}
.user-avatar {
    width: 44px; height: 44px; border-radius: 14px; display: flex;
    align-items: center; justify-content: center; font-weight: 800; font-size: 1rem;
    background: #f0f4ff; color: var(--primary); flex-shrink: 0;
}
.admin-avatar { background: #1e293b; color: #fbbf24; }
.txn-details { flex-grow: 1; margin-left: 12px; }
.txn-name { font-weight: 700; font-size: 0.9rem; margin-bottom: 2px; }
.txn-time { font-size: 0.7rem; color: var(--text-muted); font-weight: 500; }
.txn-right { text-align: right; }
.txn-amt { font-weight: 800; font-size: 0.95rem; }

/* ── Bottom Nav ── */
.bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0; background: white;
    display: flex; justify-content: space-around; padding: 0.8rem 0;
    border-top: 1px solid var(--border); z-index: 1000;
}
.nav-btn { text-align: center; color: var(--text-muted); text-decoration: none; flex: 1; }
.nav-btn.active { color: var(--primary); }
.nav-btn i { font-size: 1.3rem; display: block; margin-bottom: 3px; }
.nav-btn span { font-size: 0.6rem; font-weight: 700; }

/* ── Menu Overlay ── */
#menuOverlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(8px);
    z-index: 2000; display: none; padding: 2rem;
}
.menu-content { background: white; border-radius: 30px; padding: 2rem; position: relative; }
.close-menu { position: absolute; top: 20px; right: 20px; font-size: 1.5rem; color: var(--text-muted); }
</style>
</head>
<body>

<header class="header">
    <div class="header-logo">UNIO</div>
    <div id="user-initial" class="user-avatar" style="width:35px; height:35px; font-size:0.8rem;">U</div>
</header>

<div class="balance-card">
    <div class="bal-header">
        <span style="font-size: 0.7rem; font-weight: 600; opacity: 0.8; text-transform: uppercase;">Total Balance</span>
        <button class="menu-trigger" onclick="toggleMenu()">
            <i class="fa-solid fa-grid-2"></i> MENU
        </button>
    </div>
    <div class="bal-amount">₹<span id="balance">0.00</span></div>
    <div style="display: flex; justify-content: space-between; align-items: flex-end;">
        <div>
            <div id="user-name-card" style="font-weight: 700; font-size: 0.9rem;">—</div>
            <div id="wallet-id" style="font-size: 0.65rem; opacity: 0.7; letter-spacing: 1px;">UW000000</div>
        </div>
        <img src="https://img.icons8.com/color/48/visa.png" width="35" style="filter: brightness(0) invert(1); opacity: 0.8;">
    </div>
</div>

<div class="actions-container">
    <a href="transfer.html" class="action-item">
        <div class="icon-box" style="background: #eef2ff; color: #4f46e5;"><i class="fa-solid fa-paper-plane"></i></div>
        <span>Send</span>
    </a>
    <a href="deposit.html" class="action-item">
        <div class="icon-box" style="background: #f0fdf4; color: #16a34a;"><i class="fa-solid fa-plus"></i></div>
        <span>Add</span>
    </a>
    <a href="withdraw.html" class="action-item">
        <div class="icon-box" style="background: #fff7ed; color: #ea580c;"><i class="fa-solid fa-arrow-up-from-bracket"></i></div>
        <span>Payout</span>
    </a>
    <a href="qr.html" class="action-item">
        <div class="icon-box" style="background: #faf5ff; color: #9333ea;"><i class="fa-solid fa-qrcode"></i></div>
        <span>Scanner</span>
    </a>
</div>

<div class="section-label">UTILITY SERVICES</div>
<div class="service-row">
    <div class="service-card">
        <i class="fa-solid fa-mobile-screen" style="color: #3b82f6;"></i>
        <div style="font-size: 0.6rem; font-weight: 700; margin-top: 5px;">RECHARGE</div>
    </div>
    <div class="service-card">
        <i class="fa-solid fa-lightbulb" style="color: #eab308;"></i>
        <div style="font-size: 0.6rem; font-weight: 700; margin-top: 5px;">BILLS</div>
    </div>
    <div class="service-card">
        <i class="fa-solid fa-gift" style="color: #ec4899;"></i>
        <div style="font-size: 0.6rem; font-weight: 700; margin-top: 5px;">REWARDS</div>
    </div>
    <div class="service-card">
        <i class="fa-solid fa-shield-halved" style="color: #10b981;"></i>
        <div style="font-size: 0.6rem; font-weight: 700; margin-top: 5px;">INSURE</div>
    </div>
</div>

<div class="section-label">RECENT TRANSACTIONS</div>
<div class="txn-list" id="txn-list">
    </div>

<div id="menuOverlay">
    <div class="menu-content">
        <i class="fa-solid fa-xmark close-menu" onclick="toggleMenu()"></i>
        <h2 style="margin-bottom: 1.5rem;">Quick Menu</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <a href="settings.html" style="text-decoration:none; padding:15px; border:1px solid #eee; border-radius:15px; color:var(--text-main);">
                <i class="fa-solid fa-key" style="color:var(--primary)"></i> <b>API Keys</b>
            </a>
            <a href="help.html" style="text-decoration:none; padding:15px; border:1px solid #eee; border-radius:15px; color:var(--text-main);">
                <i class="fa-solid fa-headset" style="color:var(--primary)"></i> <b>Support</b>
            </a>
            <a href="lifafa.html" style="text-decoration:none; padding:15px; border:1px solid #eee; border-radius:15px; color:var(--text-main);">
                <i class="fa-solid fa-envelope" style="color:var(--primary)"></i> <b>Lifafa</b>
            </a>
            <div onclick="logout()" style="padding:15px; border:1px solid #fee2e2; border-radius:15px; color:var(--danger);">
                <i class="fa-solid fa-power-off"></i> <b>Logout</b>
            </div>
        </div>
    </div>
</div>

<nav class="bottom-nav">
    <a href="dashboard.html" class="nav-btn active">
        <i class="fa-solid fa-house"></i><span>Home</span>
    </a>
    <a href="transactions.html" class="nav-btn">
        <i class="fa-solid fa-list-ul"></i><span>History</span>
    </a>
    <a href="qr.html" class="nav-btn">
        <i class="fa-solid fa-qrcode"></i><span>Scan</span>
    </a>
    <a href="tg.html" class="nav-btn">
        <i class="fa-brands fa-telegram"></i><span>Channel</span>
    </a>
</nav>

<script>
const API = ''; 
const token = localStorage.getItem('token');
const user = JSON.parse(localStorage.getItem('user') || '{}');

function toggleMenu() {
    const m = document.getElementById('menuOverlay');
    m.style.display = (m.style.display === 'block') ? 'none' : 'block';
}

// Set UI Data
document.getElementById('user-initial').textContent = (user.name||'U')[0].toUpperCase();
document.getElementById('user-name-card').textContent = user.name || 'Pro User';
document.getElementById('wallet-id').textContent = user.wallet_id || 'UW000000';

async function loadData() {
    try {
        const br = await fetch(API+'/wallet/balance', {headers:{'Authorization':'Bearer '+token}});
        const bd = await br.json();
        if(bd.status==='success') document.getElementById('balance').textContent = parseFloat(bd.balance).toLocaleString('en-IN');

        const tr = await fetch(API+'/wallet/transactions', {headers:{'Authorization':'Bearer '+token}});
        const td = await tr.json();

        if(td.status==='success' && td.transactions?.length > 0) {
            let html = '';
            td.transactions.slice(0, 10).forEach(t => {
                const isCredit = t.receiver_id && (t.receiver_id._id === user.id || t.receiver_id === user.id);
                const name = isCredit ? (t.sender_id?.name || 'System Admin') : (t.receiver_id?.name || 'Receiver');
                
                // Logic for Admin Logo
                const isAdmin = name.toLowerCase().includes('admin') || name.toLowerCase().includes('system');
                const initial = name[0].toUpperCase();
                
                const avatarHTML = isAdmin 
                    ? `<div class="user-avatar admin-avatar"><i class="fa-solid fa-shield-check"></i></div>`
                    : `<div class="user-avatar">${initial}</div>`;

                html += `
                <div class="txn-item">
                    ${avatarHTML}
                    <div class="txn-details">
                        <div class="txn-name">${name}</div>
                        <div class="txn-time">${new Date(t.tx_time).toLocaleDateString('en-IN', {day:'2-digit', month:'short'})} • ${t.status}</div>
                    </div>
                    <div class="txn-right">
                        <div class="txn-amt" style="color:${isCredit ? 'var(--success)' : 'var(--danger)'}">
                            ${isCredit ? '+' : '-'}₹${parseFloat(t.amount).toFixed(2)}
                        </div>
                    </div>
                </div>`;
            });
            document.getElementById('txn-list').innerHTML = html;
        }
    } catch(e) { console.log(e); }
}

function logout() {
    if(confirm('Logout Confirm?')) {
        localStorage.clear();
        window.location.href = 'index.html';
    }
}

loadData();
</script>
</body>
</html>
