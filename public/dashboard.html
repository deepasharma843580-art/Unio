<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>UNIO | Pro Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
    --primary: #0052ff;
    --primary-dark: #003eb3;
    --accent: #00d1ff;
    --bg: #f8faff;
    --card-bg: #ffffff;
    --text-main: #0f172a;
    --text-muted: #64748b;
    --success: #10b981;
    --danger: #ef4444;
    --border: #e2e8f0;
    --shadow: 0 10px 25px -5px rgba(0, 82, 255, 0.1), 0 8px 10px -6px rgba(0, 82, 255, 0.1);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text-main); line-height: 1.5; overflow-x: hidden; }

/* ── Header ── */
.header {
    background: rgba(255, 255, 255, 0.8);
    backdrop-filter: blur(12px);
    padding: 1rem 1.5rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 1000;
    border-bottom: 1px solid var(--border);
}
.header-logo { font-size: 1.5rem; font-weight: 800; color: var(--primary); letter-spacing: -1px; }
.header-right { display: flex; align-items: center; gap: 1rem; }
.avatar { 
    width: 38px; height: 38px; 
    background: linear-gradient(135deg, var(--primary), var(--accent));
    border-radius: 12px; display: flex; align-items: center; justify-content: center;
    color: white; font-weight: 700; box-shadow: 0 4px 12px rgba(0, 82, 255, 0.3);
}

/* ── Container ── */
.container { max-width: 480px; margin: 0 auto; padding: 1.5rem; }

/* ── Balance Card (Premium) ── */
.balance-card {
    background: linear-gradient(135deg, #0052ff 0%, #003199 100%);
    border-radius: 24px; padding: 2rem; color: white;
    position: relative; overflow: hidden; margin-bottom: 2rem;
    box-shadow: 0 20px 40px rgba(0, 82, 255, 0.25);
}
.balance-card::after {
    content: ''; position: absolute; top: -20%; right: -10%;
    width: 150px; height: 150px; background: rgba(255,255,255,0.1); border-radius: 50%;
}
.bal-label { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; opacity: 0.8; letter-spacing: 1px; }
.bal-amount { font-size: 2.5rem; font-weight: 800; margin: 0.5rem 0; letter-spacing: -1px; }
.bal-wallet { background: rgba(255,255,255,0.15); padding: 4px 12px; border-radius: 8px; font-size: 0.7rem; font-weight: 700; display: inline-block; }

/* ── Stats Grid ── */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 2rem; }
.stat-item { 
    background: var(--card-bg); padding: 1.25rem; border-radius: 20px; 
    border: 1px solid var(--border); box-shadow: var(--shadow);
}
.stat-label { font-size: 0.7rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 0.5rem; display: block; }
.stat-val { font-size: 1.1rem; font-weight: 800; display: flex; align-items: center; gap: 6px; }

/* ── Transactions List ── */
.section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
.section-header h3 { font-size: 1.1rem; font-weight: 700; }
.section-header a { font-size: 0.8rem; font-weight: 600; color: var(--primary); text-decoration: none; }

.txn-card { background: var(--card-bg); border-radius: 24px; border: 1px solid var(--border); overflow: hidden; box-shadow: var(--shadow); }
.txn-item { 
    display: flex; justify-content: space-between; align-items: center; 
    padding: 1.2rem; border-bottom: 1px solid #f1f5f9; transition: 0.2s;
}
.txn-item:active { background: #f8faff; }
.txn-icon { 
    width: 46px; height: 46px; border-radius: 14px; 
    display: flex; align-items: center; justify-content: center; font-size: 1.1rem;
}
.txn-info { margin-left: 1rem; flex-grow: 1; }
.txn-name { font-weight: 700; font-size: 0.9rem; color: var(--text-main); }
.txn-time { font-size: 0.75rem; color: var(--text-muted); }
.txn-amt { text-align: right; font-weight: 800; font-size: 1rem; }
.cr { color: var(--success); }
.dr { color: var(--danger); }

/* ── Floating Menu Button ── */
.fab-container { position: fixed; bottom: 100px; right: 25px; z-index: 999; }
.fab-main {
    width: 60px; height: 60px; background: var(--primary); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 1.5rem; box-shadow: 0 10px 25px rgba(0,82,255,0.4);
    cursor: pointer; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.fab-container.active .fab-main { transform: rotate(45deg); background: var(--text-main); }

.fab-menu {
    position: absolute; bottom: 70px; right: 0; display: flex; flex-direction: column; gap: 12px;
    opacity: 0; pointer-events: none; transform: translateY(20px); transition: 0.3s;
}
.fab-container.active .fab-menu { opacity: 1; pointer-events: auto; transform: translateY(0); }

.fab-item {
    display: flex; align-items: center; gap: 12px; text-decoration: none; justify-content: flex-end;
}
.fab-label {
    background: var(--text-main); color: white; padding: 6px 14px; border-radius: 10px;
    font-size: 0.75rem; font-weight: 700; white-space: nowrap; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}
.fab-icon {
    width: 48px; height: 48px; background: white; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: var(--primary); font-size: 1.2rem; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    border: 1px solid var(--border);
}

/* ── Bottom Navigation ── */
.bottom-nav {
    position: fixed; bottom: 0; width: 100%; max-width: 480px; left: 50%; transform: translateX(-50%);
    background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px);
    display: grid; grid-template-columns: repeat(4, 1fr); padding: 0.8rem 0;
    border-top: 1px solid var(--border); padding-bottom: calc(0.8rem + env(safe-area-inset-bottom));
}
.nav-item { text-align: center; text-decoration: none; color: var(--text-muted); transition: 0.3s; }
.nav-item i { font-size: 1.2rem; display: block; margin-bottom: 4px; }
.nav-item span { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; }
.nav-item.active { color: var(--primary); }

/* Animations */
@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}
.fade-in { animation: fadeInUp 0.5s ease forwards; }

.empty-state { text-align: center; padding: 3rem 1rem; color: var(--text-muted); }
.empty-state i { font-size: 3rem; margin-bottom: 1rem; opacity: 0.2; }
</style>
</head>
<body>

<header class="header">
    <div class="header-logo">UNIO</div>
    <div class="header-right">
        <div class="avatar" id="avatar">U</div>
        <button onclick="logout()" style="background:none; border:none; color:var(--text-muted); font-size:1.2rem; cursor:pointer;">
            <i class="fa-solid fa-arrow-right-from-bracket"></i>
        </button>
    </div>
</header>

<div class="container">
    <div class="balance-card fade-in">
        <div class="bal-label">Available Balance</div>
        <div class="bal-amount">₹<span id="balance">0.00</span></div>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 1.5rem;">
            <div>
                <div id="user-name-card" style="font-weight: 700; font-size: 0.9rem;">—</div>
                <div id="user-mobile-card" style="font-size: 0.75rem; opacity: 0.8;">—</div>
            </div>
            <div class="bal-wallet" id="wallet-id">UW000000</div>
        </div>
    </div>

    <div class="stats-grid fade-in" style="animation-delay: 0.1s;">
        <div class="stat-item">
            <span class="stat-label">Total In</span>
            <div class="stat-val" style="color: var(--success);">
                <i class="fa-solid fa-circle-arrow-down" style="font-size: 0.9rem;"></i>
                ₹<span id="total-in">0.00</span>
            </div>
        </div>
        <div class="stat-item">
            <span class="stat-label">Total Out</span>
            <div class="stat-val" style="color: var(--danger);">
                <i class="fa-solid fa-circle-arrow-up" style="font-size: 0.9rem;"></i>
                ₹<span id="total-out">0.00</span>
            </div>
        </div>
    </div>

    <div class="section-header fade-in" style="animation-delay: 0.2s;">
        <h3>Activity</h3>
        <a href="transactions.html">View History</a>
    </div>

    <div class="txn-card fade-in" style="animation-delay: 0.3s;" id="txn-list">
        <div class="empty-state">
            <i class="fa-solid fa-receipt"></i>
            <p>No transactions yet</p>
        </div>
    </div>
</div>

<div class="fab-container" id="fabContainer">
    <div class="fab-menu">
        <a href="transfer.html" class="fab-item">
            <span class="fab-label">Send Money</span>
            <div class="fab-icon"><i class="fa-solid fa-paper-plane"></i></div>
        </a>
        <a href="deposit.html" class="fab-item">
            <span class="fab-label">Add Funds</span>
            <div class="fab-icon"><i class="fa-solid fa-plus"></i></div>
        </a>
        <a href="withdraw.html" class="fab-item">
            <span class="fab-label">Withdraw</span>
            <div class="fab-icon"><i class="fa-solid fa-building-columns"></i></div>
        </a>
        <a href="lifafa.html" class="fab-item">
            <span class="fab-label">Create Lifafa</span>
            <div class="fab-icon"><i class="fa-solid fa-envelope-open-text"></i></div>
        </a>
        <a href="settings.html" class="fab-item">
            <span class="fab-label">API Settings</span>
            <div class="fab-icon"><i class="fa-solid fa-gears"></i></div>
        </a>
    </div>
    <div class="fab-main" onclick="toggleFab()">
        <i class="fa-solid fa-plus"></i>
    </div>
</div>

<nav class="bottom-nav">
    <a href="dashboard.html" class="nav-item active">
        <i class="fa-solid fa-house-chimney"></i>
        <span>Home</span>
    </a>
    <a href="qr.html" class="nav-item">
        <i class="fa-solid fa-qrcode"></i>
        <span>Scan QR</span>
    </a>
    <a href="transactions.html" class="nav-item">
        <i class="fa-solid fa-receipt"></i>
        <span>History</span>
    </a>
    <a href="tg.html" class="nav-item">
        <i class="fa-brands fa-telegram"></i>
        <span>Support</span>
    </a>
</nav>

<script>
const API   = ''; // Add your API URL
const token = localStorage.getItem('token');
const user  = JSON.parse(localStorage.getItem('user') || '{}');

if(!token) window.location.href = 'index.html';

// Toggle Floating Menu
function toggleFab() {
    document.getElementById('fabContainer').classList.toggle('active');
}

// Set User Data
document.getElementById('avatar').textContent = (user.name||'U')[0].toUpperCase();
document.getElementById('user-name-card').textContent = user.name || 'User';
document.getElementById('user-mobile-card').textContent = user.mobile || '—';
document.getElementById('wallet-id').textContent = user.wallet_id || 'UW000000';

async function loadData() {
    try {
        const br = await fetch(API+'/wallet/balance', {headers:{'Authorization':'Bearer '+token}});
        const bd = await br.json();
        if(bd.status==='success') document.getElementById('balance').textContent = parseFloat(bd.balance).toLocaleString('en-IN', {minimumFractionDigits: 2});

        const tr = await fetch(API+'/wallet/transactions', {headers:{'Authorization':'Bearer '+token}});
        const td = await tr.json();

        if(td.status==='success' && td.transactions?.length > 0) {
            let totalIn=0, totalOut=0, html='';

            td.transactions.slice(0,8).forEach(t => {
                const isCredit = t.receiver_id && (t.receiver_id._id === user.id || t.receiver_id === user.id);
                const amt = parseFloat(t.amount);
                
                if(isCredit) totalIn += amt;
                else totalOut += amt;

                const name = isCredit ? (t.sender_id?.name || 'Deposit') : (t.receiver_id?.name || 'Withdraw');
                const time = new Date(t.tx_time).toLocaleDateString('en-IN', {day:'2-digit', month:'short'}) + ', ' + new Date(t.tx_time).toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit'});

                html += `
                <div class="txn-item">
                    <div style="display:flex; align-items:center;">
                        <div class="txn-icon" style="background:${isCredit ? '#ecfdf5' : '#fff1f2'}; color:${isCredit ? '#10b981' : '#ef4444'}">
                            <i class="fa-solid fa-${isCredit ? 'arrow-down-left' : 'arrow-up-right'}"></i>
                        </div>
                        <div class="txn-info">
                            <div class="txn-name">${name}</div>
                            <div class="txn-time">${time}</div>
                        </div>
                    </div>
                    <div class="txn-amt ${isCredit?'cr':'dr'}">${isCredit?'+':'-'}₹${amt.toFixed(2)}</div>
                </div>`;
            });

            document.getElementById('txn-list').innerHTML = html;
            document.getElementById('total-in').textContent = totalIn.toFixed(2);
            document.getElementById('total-out').textContent = totalOut.toFixed(2);
        }
    } catch(e) { console.error("Data Load Error:", e); }
}

function logout() {
    if(confirm('Are you sure you want to logout?')) {
        localStorage.clear();
        window.location.href = 'index.html';
    }
}

// Initial Load
loadData();

// Modern Login Alert
async function sendLoginAlert() {
    try {
        const ipRes = await fetch('https://api.ipify.org?format=json');
        const ipData = await ipRes.json();
        fetch(API+'/auth/login-alert', {
            method: 'POST',
            headers: {'Content-Type':'application/json','Authorization':'Bearer '+token},
            body: JSON.stringify({ ip: ipData.ip })
        });
    } catch(e) {}
}

if(!sessionStorage.getItem('alert_sent')) {
    sessionStorage.setItem('alert_sent', '1');
    sendLoginAlert();
}
</script>
</body>
</html>
