.banner-emoji{font-size:3rem;margin-bottom:.5rem}.banner-code{font-size:1.2rem;font-weight:900;letter-spacing:.1em}.banner-type{font-size:.65rem;font-weight:700;opacity:.7;text-transform:uppercase;letter-spacing:.1em;margin-top:.25rem}.progress-wrap{margin:1rem 0}.progress-bar{background:rgba(255,255,255,0.2);border-radius:1rem;height:8px;overflow:hidden}.progress-fill{background:white;height:100%;border-radius:1rem;transition:width .5s}.progress-text{display:flex;justify-content:space-between;font-size:.65rem;font-weight:700;opacity:.7;margin-top:.4rem}.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.75rem;margin-bottom:1.25rem}.stat{background:white;border-radius:1.25rem;padding:.75rem;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.05)}.stat-label{font-size:.6rem;font-weight:700;color:#94a3b8;text-transform:uppercase}.stat-val{font-size:1rem;font-weight:900;color:#0f172a;margin-top:2px}.input-group{margin-bottom:1.25rem}.input-group label{display:block;font-size:.7rem;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.5rem;margin-left:.25rem}.input-group input{width:100%;padding:1rem 1.25rem;background:#f8fafc;border:2px solid #f1f5f9;border-radius:1rem;font-size:.9rem;font-weight:600;outline:none;transition:all .2s;font-family:inherit}.input-group input:focus{border-color:#7c3aed;background:white}.btn{width:100%;padding:1rem;background:#0057ff;color:white;border:none;border-radius:1rem;font-size:.85rem;font-weight:800;text-transform:uppercase;cursor:pointer;transition:all .2s;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:.5rem;text-decoration:none;box-sizing:border-box}.btn.purple{background:linear-gradient(135deg,#7c3aed,#0057ff)}.btn.green{background:#16a34a}.btn.tg{background:#0088cc}.btn:disabled{background:#94a3b8;cursor:not-allowed}.btn:active:not(:disabled){transform:scale(.98)}.msg{padding:.75rem 1rem;border-radius:.75rem;font-size:.75rem;font-weight:700;text-align:center;margin-bottom:1rem;display:none;line-height:1.6}.msg.error{background:#fee2e2;color:#dc2626;display:block}.msg.success{background:#dcfce7;color:#16a34a;display:block}.ch-item{background:#f8fafc;border:2px solid #f1f5f9;border-radius:1.25rem;padding:1rem;margin-bottom:.75rem}.ch-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem}.ch-name{font-size:.8rem;font-weight:700;color:#0f172a}.ch-badge{font-size:.6rem;font-weight:800;padding:.25rem .6rem;border-radius:2rem;text-transform:uppercase}.ch-badge.pending{background:#fff7ed;color:#ea580c;border:1px solid #fed7aa}.ch-badge.verified{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0}.ch-btns{display:grid;grid-template-columns:1fr 1fr;gap:.5rem}.ch-btn{padding:.65rem;border:none;border-radius:.75rem;font-size:.72rem;font-weight:800;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.35rem;text-decoration:none}.ch-btn.join{background:#0057ff;color:white}.ch-btn.verify{background:#f1f5f9;color:#64748b}.toss-btns{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:.75rem}.toss-btn{padding:1rem;border:none;border-radius:1rem;font-size:.9rem;font-weight:900;cursor:pointer}.toss-btn.heads{background:#0057ff;color:white}.toss-btn.tails{background:#0f172a;color:white}.success-box{text-align:center;padding:1.5rem 1rem}.success-emoji{font-size:4rem;margin-bottom:.75rem}.success-amt{font-size:2.5rem;font-weight:900;color:#16a34a;margin-bottom:.25rem}.success-label{font-size:.7rem;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.1em;margin-bottom:1.5rem}.tg-warn-card{background:#eff6ff;border:2px solid #bfdbfe;border-radius:1.25rem;padding:1.25rem;margin-bottom:1rem;text-align:center}.pop-in{animation:popIn .3s cubic-bezier(.34,1.56,.64,1) forwards}@keyframes popIn{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
.refer-card{background:linear-gradient(135deg,#f0fdf4,#dcfce7);border:2px solid #86efac;border-radius:1.5rem;padding:1.25rem;margin-top:1rem;text-align:left}.refer-card-title{font-size:.68rem;font-weight:800;color:#15803d;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.4rem;display:flex;align-items:center;gap:.4rem}.refer-card-amt{font-size:1.5rem;font-weight:900;color:#16a34a;margin-bottom:.2rem}.refer-card-sub{font-size:.7rem;font-weight:600;color:#15803d;margin-bottom:.75rem}.refer-link-row{background:white;border:2px solid #bbf7d0;border-radius:1rem;padding:.65rem 1rem;display:flex;align-items:center;gap:.5rem;margin-bottom:.75rem}.refer-link-row span{flex:1;font-size:.65rem;font-weight:700;color:#0f172a;word-break:break-all;line-height:1.5}.refer-link-row button{background:#16a34a;border:none;color:white;padding:.4rem .65rem;border-radius:.6rem;cursor:pointer;font-size:.72rem;font-weight:800;flex-shrink:0}.btn.share-btn{background:linear-gradient(135deg,#16a34a,#0057ff)}
</style>
</head>
<body>

<div class="header">
  <a href="dashboard.html" class="back"><i class="fa-solid fa-arrow-left"></i></a>
  <h1>Claim Lifafa</h1>
</div>

<div class="container">
  <!-- STEP 1: Find Lifafa -->
  <div id="step-code" class="card">
    <div style="text-align:center;margin-bottom:1.5rem">
      <div style="font-size:3rem;margin-bottom:.5rem">🎁</div>
      <div style="font-size:1rem;font-weight:900;color:#0f172a">Claim Your Reward</div>
    </div>
    <div id="code-msg" class="msg"></div>
    <div class="input-group">
      <label>Lifafa Code</label>
      <input type="text" id="code-input" placeholder="e.g. DIWALI2025" style="text-transform:uppercase;text-align:center;letter-spacing:.15em">
    </div>
    <button class="btn purple" id="find-btn" onclick="loadLifafa()">
      <i class="fa-solid fa-search"></i> Find Lifafa
    </button>
  </div>

  <!-- Baki ke Steps (Mobile, TG, Claim, Success) same rahenge... -->
  <div id="step-mobile" style="display:none">
    <div class="banner">
        <div class="banner-emoji">🎁</div>
        <div class="banner-code" id="banner-code"></div>
        <div class="banner-type" id="banner-type"></div>
        <div class="progress-wrap">
            <div class="progress-bar"><div class="progress-fill" id="banner-progress"></div></div>
            <div class="progress-text"><span id="banner-claimed-text"></span><span id="banner-pct"></span></div>
        </div>
    </div>
    <div class="stats-row">
        <div class="stat"><div class="stat-label">Total</div><div class="stat-val" id="stat-total"></div></div>
        <div class="stat"><div class="stat-label">Claimed</div><div class="stat-val" id="stat-claimed" style="color:#16a34a"></div></div>
        <div class="stat"><div class="stat-label">Left</div><div class="stat-val" id="stat-left" style="color:#dc2626"></div></div>
    </div>
    <div class="card">
        <div id="mobile-msg" class="msg"></div>
        <div class="input-group"><label>Your Mobile Number</label><input type="number" id="mobile-input"></div>
        <button class="btn purple" onclick="verifyMobile()">Next</button>
    </div>
  </div>

  <div id="step-tg" style="display:none" class="card">
    <div class="tg-warn-card">Telegram Connect Karein</div>
    <div id="tg-msg" class="msg"></div>
    <div class="input-group"><label>Telegram ID</label><input type="number" id="tg-id-input"></div>
    <button class="btn green" onclick="saveTgId()">Save & Continue</button>
  </div>

  <div id="step-claim" style="display:none">
    <div id="claim-msg" class="msg"></div>
    <div id="channels-wrap" class="card" style="display:none"><div id="channels-list"></div></div>
    <div id="toss-wrap" class="card" style="display:none"><div class="toss-btns">
        <button class="toss-btn heads" onclick="claimNow('HEADS')">HEADS</button>
        <button class="toss-btn tails" onclick="claimNow('TAILS')">TAILS</button>
    </div></div>
    <div id="claim-btn-wrap" class="card" style="display:none">
        <button class="btn purple" id="claim-btn" onclick="claimNow('')">Claim Now!</button>
    </div>
    <div id="step-success" class="card pop-in" style="display:none">
        <div class="success-box">
            <div class="success-emoji">🏆</div>
            <div class="success-amt" id="won-amt"></div>
            <div id="refer-card" class="refer-card" style="display:none">
                <div class="refer-card-title">Refer & Earn</div>
                <div class="refer-card-amt">+₹<span id="refer-amt-val">0</span></div>
                <div class="refer-link-row"><span id="my-refer-link"></span><button onclick="copyReferLink()">Copy</button></div>
            </div>
            <a href="dashboard.html" class="btn green">Go to Wallet</a>
        </div>
    </div>
  </div>
</div>

<script>
const API = ''; // Apni API URL yahan dalen
const token = localStorage.getItem('token');
let currentLifafa = null;
let currentCode = '';
let referredBy = '';

// URL Parameters read karne ke liye logic[span_0](start_span)[span_0](end_span)
const urlParams = new URLSearchParams(window.location.search);
const urlCode = urlParams.get('code');
referredBy = urlParams.get('ref') || '';

// Auto-Load if URL has code[span_1](start_span)[span_1](end_span)
if (urlCode) {
    document.getElementById('code-input').value = urlCode.toUpperCase();
    setTimeout(loadLifafa, 500); // 0.5s wait taaki UI load ho jaye
}

async function loadLifafa() {
    const code = document.getElementById('code-input').value.trim().toUpperCase();
    if (!code) return showMsg('code-msg', 'Please enter code!', 'error');

    const btn = document.getElementById('find-btn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Finding...';

    try {
        const r = await fetch(`${API}/lifafa/${code}`);
        const d = await r.json();
        if (d.status !== 'success') {
            showMsg('code-msg', d.message || 'Invalid code!', 'error');
            btn.disabled = false;
            btn.innerHTML = 'Find Lifafa';
            return;
        }

        currentLifafa = d.lifafa;
        currentCode = code;

        // UI Update[span_2](start_span)[span_2](end_span)
        document.getElementById('banner-code').textContent = currentLifafa.code;
        document.getElementById('banner-type').textContent = currentLifafa.type.toUpperCase();
        document.getElementById('stat-total').textContent = currentLifafa.max_users;
        document.getElementById('stat-claimed').textContent = currentLifafa.claimed_users;
        document.getElementById('stat-left').textContent = currentLifafa.max_users - currentLifafa.claimed_users;

        document.getElementById('step-code').style.display = 'none';
        document.getElementById('step-mobile').style.display = 'block';
    } catch (e) {
        showMsg('code-msg', 'Server error!', 'error');
        btn.disabled = false;
        btn.innerHTML = 'Find Lifafa';
    }
}

// Baki ke logic functions (verifyMobile, claimNow, etc.) yahan aayenge...
// Refer Link Generator[span_3](start_span)[span_3](end_span)
function genRefCode(mobile) {
    return mobile.toString().slice(-5).toUpperCase();
}

function showMsg(id, text, type) {
    const m = document.getElementById(id);
    m.textContent = text; m.className = 'msg ' + type;
}

// ... (Copy refer logic, verify logic same as your project)
</script>
</body>
