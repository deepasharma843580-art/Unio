<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TG Control | UNIO</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{
  --bg:#07090f;--bg2:#0d1117;--bg3:#111827;
  --border:#1a2535;--border2:#1e3a5f;
  --blue:#0ea5e9;--blue2:#0284c7;--blue3:rgba(14,165,233,.12);
  --text:#e2eaf6;--muted:#4a6080;--muted2:#7a90a8;
  --green:#10b981;--red:#f43f5e;--yellow:#f59e0b;
  --mono:'JetBrains Mono',monospace;--sans:'Outfit',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{min-height:100%;background:var(--bg);color:var(--text)}
body{font-family:var(--sans);overflow-x:hidden}

/* grid bg */
body::before{
  content:'';position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(14,165,233,.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(14,165,233,.03) 1px,transparent 1px);
  background-size:32px 32px;pointer-events:none;z-index:0
}

/* ── TOP BAR ── */
.topbar{
  position:sticky;top:0;z-index:50;
  display:flex;align-items:center;justify-content:space-between;
  padding:.85rem 1.5rem;
  background:rgba(7,9,15,.9);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(14px);
}
.brand{display:flex;align-items:center;gap:.7rem}
.brand-dot{
  width:30px;height:30px;border-radius:8px;
  background:linear-gradient(135deg,var(--blue),var(--blue2));
  display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:.75rem;font-weight:700;color:#fff;
}
.brand-name{font-family:var(--mono);font-size:.88rem;font-weight:700;color:var(--text)}
.brand-badge{
  font-size:.5rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  background:rgba(14,165,233,.15);color:var(--blue);
  border:1px solid rgba(14,165,233,.25);border-radius:4px;
  padding:.15rem .45rem;margin-left:.25rem;
}
.topbar-right{display:flex;align-items:center;gap:.65rem}
.pass-wrap{display:flex;align-items:center;gap:.5rem}
.pass-field{
  width:100px;padding:.4rem .75rem;
  background:var(--bg2);border:1px solid var(--border);border-radius:.6rem;
  font-size:.75rem;font-family:var(--mono);color:var(--text);outline:none;
  letter-spacing:.12em;text-align:center;transition:border-color .2s;
}
.pass-field:focus{border-color:var(--blue)}
.pass-btn{
  padding:.4rem .85rem;background:var(--blue2);color:#fff;
  border:none;border-radius:.6rem;font-size:.72rem;font-weight:700;
  cursor:pointer;font-family:var(--sans);transition:background .2s;
}
.pass-btn:hover{background:var(--blue)}
.unlock-status{font-size:.7rem;font-weight:600;display:flex;align-items:center;gap:.3rem}
.unlock-status.ok{color:var(--green)}
.unlock-status.fail{color:var(--red)}

/* ── WRAP ── */
.wrap{max-width:760px;margin:0 auto;padding:2rem 1rem;position:relative;z-index:1}

/* ── LOCK SCREEN ── */
.lock-screen{
  text-align:center;padding:5rem 1rem;
}
.lock-icon{
  width:64px;height:64px;border-radius:1.1rem;
  background:var(--bg3);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 1.25rem;font-size:1.4rem;color:var(--muted);
}
.lock-title{font-family:var(--mono);font-size:1rem;font-weight:700;color:var(--muted);margin-bottom:.35rem}
.lock-sub{font-size:.75rem;color:var(--muted);opacity:.6}

/* ── SEARCH BAR ── */
.search-bar{
  display:flex;gap:.65rem;margin-bottom:1.75rem;
  background:var(--bg2);border:1px solid var(--border);
  border-radius:1rem;padding:.6rem .75rem;
  transition:border-color .2s;
}
.search-bar:focus-within{border-color:var(--blue2)}
.search-bar i{color:var(--muted);font-size:.9rem;padding:.5rem .25rem}
.search-bar input{
  flex:1;background:transparent;border:none;outline:none;
  font-size:.92rem;font-family:var(--sans);color:var(--text);
  font-weight:500;
}
.search-bar input::placeholder{color:var(--muted)}
.search-go{
  padding:.55rem 1.1rem;background:var(--blue2);color:#fff;
  border:none;border-radius:.65rem;font-size:.78rem;font-weight:700;
  cursor:pointer;font-family:var(--sans);transition:background .2s;
  white-space:nowrap;
}
.search-go:hover{background:var(--blue)}
.search-go:disabled{background:var(--muted);cursor:not-allowed}

/* ── USER CARD ── */
.user-card{
  background:var(--bg2);border:1px solid var(--border2);
  border-radius:1.25rem;overflow:hidden;margin-bottom:1.25rem;
  animation:slideUp .35s ease;
}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.user-header{
  background:linear-gradient(135deg,rgba(14,165,233,.15),rgba(2,132,199,.08));
  border-bottom:1px solid var(--border2);
  padding:1.25rem 1.5rem;
  display:flex;align-items:center;justify-content:space-between;gap:1rem;
}
.user-avatar{
  width:48px;height:48px;border-radius:.9rem;
  background:linear-gradient(135deg,var(--blue),var(--blue2));
  display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:1.1rem;font-weight:700;color:#fff;
  flex-shrink:0;
}
.user-main{flex:1;min-width:0}
.user-name{font-family:var(--sans);font-size:1.1rem;font-weight:700;color:var(--text)}
.user-mobile{font-family:var(--mono);font-size:.78rem;color:var(--muted2);margin-top:.2rem}
.user-balance{
  text-align:right;
}
.user-bal-lbl{font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;font-weight:700}
.user-bal-amt{font-family:var(--mono);font-size:1.3rem;font-weight:700;color:var(--blue);margin-top:.1rem}

/* ── INFO GRID ── */
.info-grid{
  display:grid;grid-template-columns:repeat(2,1fr);gap:1px;
  background:var(--border);
}
@media(min-width:600px){.info-grid{grid-template-columns:repeat(3,1fr)}}
.info-cell{
  background:var(--bg2);padding:1rem 1.25rem;
}
.info-cell-lbl{font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;font-weight:700;margin-bottom:.35rem}
.info-cell-val{font-family:var(--mono);font-size:.82rem;font-weight:600;color:var(--text);word-break:break-all}
.info-cell-val.blue{color:var(--blue)}
.info-cell-val.green{color:var(--green)}
.info-cell-val.yellow{color:var(--yellow)}
.info-cell-val.red{color:var(--red)}
.badge{display:inline-block;padding:.15rem .5rem;border-radius:.35rem;font-size:.62rem;font-weight:700;letter-spacing:.04em}
.badge-green{background:rgba(16,185,129,.15);color:var(--green);border:1px solid rgba(16,185,129,.2)}
.badge-red{background:rgba(244,63,94,.12);color:var(--red);border:1px solid rgba(244,63,94,.2)}
.badge-yellow{background:rgba(245,158,11,.12);color:var(--yellow);border:1px solid rgba(245,158,11,.2)}

/* ── TG UPDATE SECTION ── */
.tg-section{
  background:var(--bg3);border:1px solid var(--border2);
  border-radius:1.1rem;padding:1.25rem 1.5rem;margin-bottom:1.25rem;
  animation:slideUp .4s .1s ease both;
}
.tg-section-head{
  display:flex;align-items:center;gap:.65rem;
  font-size:.7rem;font-weight:700;color:var(--muted2);
  text-transform:uppercase;letter-spacing:.08em;margin-bottom:1rem;
}
.tg-section-head i{color:var(--blue);font-size:.85rem}
.tg-current{
  display:flex;align-items:center;gap:.65rem;
  background:var(--bg2);border:1px solid var(--border);border-radius:.75rem;
  padding:.75rem 1rem;margin-bottom:1rem;
}
.tg-current i{color:var(--blue);font-size:1rem}
.tg-current-lbl{font-size:.62rem;color:var(--muted);text-transform:uppercase;font-weight:700;letter-spacing:.06em}
.tg-current-val{font-family:var(--mono);font-size:.88rem;font-weight:700;color:var(--text)}

.tg-input-row{display:flex;gap:.65rem}
.tg-input{
  flex:1;padding:.75rem 1rem;
  background:var(--bg2);border:1px solid var(--border);border-radius:.75rem;
  font-family:var(--mono);font-size:.88rem;color:var(--text);outline:none;
  transition:border-color .2s;
}
.tg-input:focus{border-color:var(--blue2)}
.tg-input::placeholder{color:var(--muted)}
.tg-save-btn{
  padding:.75rem 1.25rem;background:var(--blue2);color:#fff;
  border:none;border-radius:.75rem;font-size:.8rem;font-weight:700;
  cursor:pointer;font-family:var(--sans);transition:all .2s;
  display:flex;align-items:center;gap:.45rem;white-space:nowrap;
}
.tg-save-btn:hover{background:var(--blue)}
.tg-save-btn:disabled{background:var(--muted);cursor:not-allowed}

/* ── TRANSACTIONS ── */
.tx-section{
  animation:slideUp .4s .2s ease both;
}
.tx-head{
  font-size:.7rem;font-weight:700;color:var(--muted2);
  text-transform:uppercase;letter-spacing:.08em;
  display:flex;align-items:center;gap:.5rem;margin-bottom:.85rem;
}
.tx-head i{color:var(--blue)}
.tx-item{
  display:flex;align-items:center;gap:.85rem;
  padding:.85rem 1rem;background:var(--bg2);
  border:1px solid var(--border);border-radius:.85rem;
  margin-bottom:.5rem;transition:border-color .2s;
}
.tx-item:hover{border-color:var(--border2)}
.tx-ico{
  width:34px;height:34px;border-radius:.6rem;
  display:flex;align-items:center;justify-content:center;font-size:.8rem;flex-shrink:0;
}
.tx-ico.cr{background:rgba(16,185,129,.15);color:var(--green)}
.tx-ico.dr{background:rgba(244,63,94,.12);color:var(--red)}
.tx-ico.tr{background:var(--blue3);color:var(--blue)}
.tx-info{flex:1;min-width:0}
.tx-rem{font-size:.78rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-time{font-size:.62rem;color:var(--muted);margin-top:.15rem;font-family:var(--mono)}
.tx-amt{font-family:var(--mono);font-size:.9rem;font-weight:700;white-space:nowrap}
.tx-amt.cr{color:var(--green)}
.tx-amt.dr{color:var(--red)}

/* ── MSG ── */
.msg-bar{
  display:flex;align-items:center;gap:.6rem;
  padding:.65rem 1rem;border-radius:.75rem;
  font-size:.75rem;font-weight:600;margin-bottom:.85rem;
  display:none;
}
.msg-bar.show{display:flex}
.msg-bar.err{background:rgba(244,63,94,.1);color:var(--red);border:1px solid rgba(244,63,94,.2)}
.msg-bar.ok{background:rgba(16,185,129,.1);color:var(--green);border:1px solid rgba(16,185,129,.2)}

.spin{animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}

.empty-state{text-align:center;padding:2rem;color:var(--muted);font-size:.78rem}
.empty-state i{font-size:1.8rem;display:block;margin-bottom:.5rem;opacity:.25}

/* ── SUCCESS FLASH ── */
.flash{
  position:fixed;top:1.25rem;left:50%;transform:translateX(-50%) translateY(-80px);
  background:linear-gradient(135deg,#0ea5e9,#0284c7);
  color:#fff;border-radius:.85rem;padding:.75rem 1.5rem;
  font-size:.8rem;font-weight:700;
  display:flex;align-items:center;gap:.6rem;
  box-shadow:0 8px 32px rgba(14,165,233,.35);
  z-index:9999;transition:transform .35s cubic-bezier(.34,1.56,.64,1);
  white-space:nowrap;
}
.flash.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="brand">
    <div class="brand-dot">U</div>
    <div>
      <span class="brand-name">UNIO</span>
      <span class="brand-badge">TG CONTROL</span>
    </div>
  </div>
  <div class="topbar-right">
    <div class="pass-wrap">
      <input class="pass-field" type="password" id="pass-inp" placeholder="••••" onkeydown="if(event.key==='Enter')unlock()">
      <button class="pass-btn" onclick="unlock()">Unlock</button>
      <span class="unlock-status" id="unlock-st"></span>
    </div>
  </div>
</div>

<!-- FLASH -->
<div class="flash" id="flash"></div>

<div class="wrap">

  <!-- LOCK -->
  <div id="lock-screen" class="lock-screen">
    <div class="lock-icon"><i class="fa-solid fa-lock"></i></div>
    <div class="lock-title">TG Control Panel</div>
    <div class="lock-sub">Enter password to access user management</div>
  </div>

  <!-- MAIN -->
  <div id="main" style="display:none">

    <!-- SEARCH -->
    <div class="search-bar">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input type="number" id="search-inp" placeholder="Enter mobile number..." onkeydown="if(event.key==='Enter')searchUser()">
      <button class="search-go" id="search-btn" onclick="searchUser()">
        <i class="fa-solid fa-arrow-right"></i> Search
      </button>
    </div>

    <div id="search-msg" class="msg-bar"></div>

    <!-- RESULT -->
    <div id="result" style="display:none">

      <!-- USER CARD -->
      <div class="user-card" id="user-card">
        <div class="user-header">
          <div class="user-avatar" id="u-avatar">?</div>
          <div class="user-main">
            <div class="user-name" id="u-name">—</div>
            <div class="user-mobile" id="u-mobile">—</div>
          </div>
          <div class="user-balance">
            <div class="user-bal-lbl">Balance</div>
            <div class="user-bal-amt" id="u-bal">₹0</div>
          </div>
        </div>

        <div class="info-grid" id="info-grid"></div>
      </div>

      <!-- TG UPDATE -->
      <div class="tg-section">
        <div class="tg-section-head">
          <i class="fa-brands fa-telegram"></i>
          Telegram ID Management
        </div>
        <div class="tg-current">
          <i class="fa-brands fa-telegram"></i>
          <div>
            <div class="tg-current-lbl">Current TG ID</div>
            <div class="tg-current-val" id="tg-current-val">Not linked</div>
          </div>
        </div>
        <div id="tg-msg" class="msg-bar"></div>
        <div class="tg-input-row">
          <input class="tg-input" type="number" id="tg-new-inp" placeholder="Enter new Telegram ID...">
          <button class="tg-save-btn" id="tg-save-btn" onclick="updateTg()">
            <i class="fa-solid fa-floppy-disk"></i> Update
          </button>
        </div>
      </div>

      <!-- TRANSACTIONS -->
      <div class="tx-section">
        <div class="tx-head"><i class="fa-solid fa-clock-rotate-left"></i> Recent Transactions</div>
        <div id="tx-list"></div>
      </div>

    </div><!-- /result -->
  </div><!-- /main -->

</div><!-- /wrap -->

<script>
const API = 'https://unio-hazel.vercel.app';
let PASS  = '';
let currentMobile = '';

// ── Unlock ────────────────────────────────────────────────────────────────────
function unlock() {
  const p = document.getElementById('pass-inp').value.trim();
  if (!p) return;
  PASS = p;
  fetch(`${API}/lite/user/0000000000?pass=${p}`)
    .then(r => r.json())
    .then(d => {
      if (d.message === 'Unauthorized') {
        document.getElementById('unlock-st').innerHTML = '<i class="fa-solid fa-xmark"></i> Wrong';
        document.getElementById('unlock-st').className = 'unlock-status fail';
      } else {
        showMain();
      }
    })
    .catch(() => showMain());
}

function showMain() {
  document.getElementById('unlock-st').innerHTML = '<i class="fa-solid fa-check"></i> Unlocked';
  document.getElementById('unlock-st').className = 'unlock-status ok';
  document.getElementById('lock-screen').style.display = 'none';
  document.getElementById('main').style.display = 'block';
  document.getElementById('search-inp').focus();
}

// ── Search ────────────────────────────────────────────────────────────────────
async function searchUser() {
  const mob = document.getElementById('search-inp').value.trim();
  hideMsg('search-msg');
  if (!mob || mob.length < 10) return showMsg('search-msg','err','Valid mobile enter karo (10 digits)');

  currentMobile = mob;
  const btn = document.getElementById('search-btn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fa-solid fa-circle-notch spin"></i> Searching';

  try {
    const r = await fetch(`${API}/lite/user/${mob}?pass=${PASS}`);
    const d = await r.json();

    if (d.status !== 'success') {
      showMsg('search-msg','err', d.message || 'User not found');
      document.getElementById('result').style.display = 'none';
    } else {
      renderUser(d.user, d.transactions);
      document.getElementById('result').style.display = 'block';
    }
  } catch(e) {
    showMsg('search-msg','err','Server error!');
  }

  btn.disabled = false;
  btn.innerHTML = '<i class="fa-solid fa-arrow-right"></i> Search';
}

// ── Render User ───────────────────────────────────────────────────────────────
function renderUser(u, txns) {
  // Avatar
  const initials = (u.name||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  document.getElementById('u-avatar').textContent = initials;
  document.getElementById('u-name').textContent   = u.name || '—';
  document.getElementById('u-mobile').textContent = u.mobile;
  document.getElementById('u-bal').textContent    = '₹' + parseFloat(u.balance||0).toFixed(2);

  // TG current
  const tgVal = u.tg_id || 'Not linked';
  document.getElementById('tg-current-val').textContent = tgVal;
  document.getElementById('tg-current-val').style.color = u.tg_id ? '' : 'var(--red)';

  // Info grid
  const fields = [
    { lbl:'Wallet ID',   val: u.wallet_id || '—',       cls:'blue' },
    { lbl:'Email',       val: u.email || '—',            cls:'' },
    { lbl:'KYC',         val: u.kyc_status || 'pending', cls: u.kyc_status==='verified'?'green':'yellow', badge:true },
    { lbl:'Joined',      val: u.createdAt ? new Date(u.createdAt).toLocaleDateString('en-IN') : '—', cls:'' },
    { lbl:'TG ID',       val: u.tg_id || '—',           cls: u.tg_id?'blue':'red' },
    { lbl:'Status',      val: u.status || 'active',      cls: u.status==='active'?'green':'red', badge:true },
  ];

  document.getElementById('info-grid').innerHTML = fields.map(f => `
    <div class="info-cell">
      <div class="info-cell-lbl">${f.lbl}</div>
      <div class="info-cell-val ${f.cls||''}">
        ${f.badge
          ? `<span class="badge badge-${f.cls||'yellow'}">${f.val}</span>`
          : f.val
        }
      </div>
    </div>
  `).join('');

  // Transactions
  if (!txns || !txns.length) {
    document.getElementById('tx-list').innerHTML =
      '<div class="empty-state"><i class="fa-solid fa-receipt"></i>No transactions yet</div>';
    return;
  }

  document.getElementById('tx-list').innerHTML = txns.map(t => {
    const isCredit = t.type === 'credit' || (t.receiver_id && t.receiver_id.toString() === u._id.toString());
    const iconClass = t.type === 'transfer' ? 'tr' : (isCredit ? 'cr' : 'dr');
    const iconName  = t.type === 'credit' ? 'fa-arrow-down-long' : (t.type === 'transfer' ? 'fa-right-left' : 'fa-arrow-up-long');
    const sign      = isCredit ? '+' : '-';
    const amtCls    = isCredit ? 'cr' : 'dr';
    const dateStr   = new Date(t.tx_time).toLocaleString('en-IN', {
      timeZone:'Asia/Kolkata', day:'2-digit', month:'short',
      hour:'2-digit', minute:'2-digit', hour12:true
    });
    return `<div class="tx-item">
      <div class="tx-ico ${iconClass}"><i class="fa-solid ${iconName}"></i></div>
      <div class="tx-info">
        <div class="tx-rem">${t.remark || t.type}</div>
        <div class="tx-time">${dateStr} · <span style="color:${t.status==='success'?'var(--green)':'var(--red)'}">${t.status}</span></div>
      </div>
      <div class="tx-amt ${amtCls}">${sign}₹${parseFloat(t.amount||0).toFixed(2)}</div>
    </div>`;
  }).join('');
}

// ── Update TG ─────────────────────────────────────────────────────────────────
async function updateTg() {
  const newTg = document.getElementById('tg-new-inp').value.trim();
  hideMsg('tg-msg');

  if (!newTg) return showMsg('tg-msg','err','New TG ID enter karo');
  if (!currentMobile) return showMsg('tg-msg','err','Pehle user search karo');

  const btn = document.getElementById('tg-save-btn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fa-solid fa-circle-notch spin"></i> Saving';

  try {
    const r = await fetch(`${API}/lite/update-tg`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ mobile: currentMobile, tg_id: newTg, pass: PASS })
    });
    const d = await r.json();

    if (d.status === 'success') {
      document.getElementById('tg-current-val').textContent = newTg;
      document.getElementById('tg-current-val').style.color = '';
      document.getElementById('tg-new-inp').value = '';
      showMsg('tg-msg','ok','TG ID updated successfully!');
      flash('✅ TG ID updated for ' + (d.user?.name || currentMobile));
    } else {
      showMsg('tg-msg','err', d.message || 'Failed!');
    }
  } catch(e) {
    showMsg('tg-msg','err','Server error!');
  }

  btn.disabled = false;
  btn.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Update';
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function showMsg(id, type, text) {
  const el = document.getElementById(id);
  el.innerHTML = `<i class="fa-solid ${type==='err'?'fa-circle-exclamation':'fa-check-circle'}"></i> ${text}`;
  el.className = `msg-bar show ${type}`;
}
function hideMsg(id) {
  document.getElementById(id).className = 'msg-bar';
}

let flashTimer;
function flash(msg) {
  const el = document.getElementById('flash');
  el.innerHTML = '<i class="fa-solid fa-bolt"></i> ' + msg;
  el.classList.add('show');
  clearTimeout(flashTimer);
  flashTimer = setTimeout(() => el.classList.remove('show'), 3000);
}
</script>
</body>
</html>
