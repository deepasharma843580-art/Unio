<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNIO Hazel | AI Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root { --primary: #0057ff; --bg: #f0f4ff; }
* { margin:0; padding:0; box-sizing:border-box; font-family:'Plus Jakarta Sans',sans-serif; }
body { background: var(--bg); height: 100vh; display: flex; flex-direction: column; }

/* Header */
.header { background: white; padding: 1.2rem; display: flex; align-items: center; gap: 1rem; box-shadow: 0 4px 15px rgba(0,87,255,0.08); z-index: 10; }
.back-btn { color: #64748b; text-decoration: none; font-size: 1.2rem; }
.hazel-profile { display: flex; align-items: center; gap: 0.8rem; }
.avatar { width: 42px; height: 42px; background: linear-gradient(135deg, var(--primary), #0033cc); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.2rem; box-shadow: 0 4px 10px rgba(0,87,255,0.3); }
.hazel-info h2 { font-size: 1rem; font-weight: 800; color: #0f172a; }
.hazel-info p { font-size: 0.65rem; color: #16a34a; font-weight: 700; text-transform: uppercase; }

/* Chat Area */
#chat-container { flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; scroll-behavior: smooth; }
.msg { max-width: 85%; padding: 1rem; border-radius: 1.2rem; font-size: 0.85rem; line-height: 1.5; position: relative; animation: slideUp 0.3s ease; }
.msg.user { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 0.2rem; box-shadow: 0 5px 15px rgba(0,87,255,0.2); }
.msg.bot { align-self: flex-start; background: white; color: #1e293b; border-bottom-left-radius: 0.2rem; box-shadow: 0 5px 15px rgba(0,0,0,0.03); border: 1px solid #e2e8f0; }

/* Typing Animation */
.typing { font-style: italic; font-size: 0.75rem; color: #94a3b8; margin-left: 0.5rem; display: none; }

/* Input Area */
.input-area { background: white; padding: 1.2rem; border-top: 1px solid #e2e8f0; display: flex; gap: 0.8rem; align-items: center; }
#user-input { flex: 1; border: none; background: #f8fafc; padding: 0.9rem 1.2rem; border-radius: 1rem; font-size: 0.9rem; font-weight: 600; outline: none; border: 1px solid transparent; transition: 0.3s; }
#user-input:focus { border-color: var(--primary); background: white; }
.send-btn { width: 48px; height: 48px; background: var(--primary); border: none; border-radius: 50%; color: white; font-size: 1.1rem; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
.send-btn:active { transform: scale(0.9); }

@keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div class="header">
    <a href="dashboard.html" class="back-btn"><i class="fa-solid fa-chevron-left"></i></a>
    <div class="hazel-profile">
        <div class="avatar"><i class="fa-solid fa-sparkles"></i></div>
        <div class="hazel-info">
            <h2>UNIO Hazel</h2>
            <p><i class="fa-solid fa-circle" style="font-size: 0.5rem;"></i> Online</p>
        </div>
    </div>
</div>

<div id="chat-container">
    <div class="msg bot">Hello! I am <b>Hazel</b>, your UNIO Personal AI. Main aapke account aur wallet se judi har jankari de sakti hun. Boltiye, main aapki kya madad karun?</div>
</div>

<div class="typing" id="typing">Hazel is thinking...</div>

<div class="input-area">
    <input type="text" id="user-input" placeholder="Ask Hazel anything..." autocomplete="off">
    <button class="send-btn" onclick="sendMessage()"><i class="fa-solid fa-paper-plane-top"></i></button>
</div>

<script src="ai.js"></script>
</body>
</html>
