<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UNIO AI — Hazel Intelligence</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:      #1a56db;
      --blue2:     #1e40af;
      --blue3:     #3b82f6;
      --blue-lt:   #eff6ff;
      --blue-glow: rgba(26,86,219,.18);
      --bg:        #f0f5ff;
      --white:     #ffffff;
      --border:    #dbeafe;
      --text:      #0f172a;
      --muted:     #64748b;
      --ai-bg:     #ffffff;
      --user-bg:   linear-gradient(135deg, #1a56db, #1e40af);
    }

    html, body {
      height: 100%;
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* ── Background ── */
    .bg-layer {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 800px 500px at 50% -80px, rgba(26,86,219,.13), transparent),
        radial-gradient(ellipse 400px 400px at 100% 80%, rgba(59,130,246,.08), transparent),
        radial-gradient(ellipse 300px 300px at 0% 100%, rgba(26,86,219,.06), transparent);
    }

    /* Moving grid */
    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(26,86,219,.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(26,86,219,.05) 1px, transparent 1px);
      background-size: 36px 36px;
      animation: gridMove 20s linear infinite;
    }
    @keyframes gridMove {
      from { background-position: 0 0; }
      to   { background-position: 36px 36px; }
    }

    /* ── Layout ── */
    .layout {
      position: relative; z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      max-width: 860px;
      margin: 0 auto;
      padding: 0 16px;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 0 14px;
      border-bottom: 1.5px solid var(--border);
      flex-shrink: 0;
      background: rgba(240,245,255,.85);
      backdrop-filter: blur(12px);
      position: sticky; top: 0; z-index: 10;
    }

    .header-left {
      display: flex; align-items: center; gap: 12px;
    }

    .ai-avatar {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, var(--blue), var(--blue2));
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      box-shadow: 0 4px 16px var(--blue-glow);
      position: relative;
      flex-shrink: 0;
    }
    .ai-avatar::after {
      content: '';
      position: absolute;
      bottom: 2px; right: 2px;
      width: 10px; height: 10px;
      background: #22c55e;
      border-radius: 50%;
      border: 2px solid var(--bg);
    }

    .header-info h1 {
      font-size: 17px; font-weight: 800;
      letter-spacing: -.3px;
      color: var(--text);
    }
    .header-info p {
      font-size: 12px; color: var(--muted);
      font-weight: 500;
    }
    .header-info span {
      color: #22c55e; font-weight: 600;
    }

    .header-right {
      display: flex; align-items: center; gap: 10px;
    }

    .badge-model {
      background: var(--blue-lt);
      border: 1.5px solid var(--border);
      color: var(--blue);
      font-size: 10px; font-weight: 700;
      padding: 4px 10px;
      border-radius: 20px;
      letter-spacing: .5px;
      text-transform: uppercase;
      font-family: 'JetBrains Mono', monospace;
    }

    .btn-back {
      display: flex; align-items: center; gap: 6px;
      text-decoration: none;
      color: var(--muted);
      font-size: 13px; font-weight: 600;
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 6px 12px;
      transition: all .2s;
    }
    .btn-back:hover { border-color: var(--blue); color: var(--blue); }

    /* ── Chat area ── */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px 0 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }
    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-track { background: transparent; }
    .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── Welcome screen ── */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      text-align: center;
      padding: 40px 20px;
      gap: 20px;
    }

    .welcome-orb {
      width: 90px; height: 90px;
      background: linear-gradient(135deg, var(--blue), var(--blue3));
      border-radius: 28px;
      display: flex; align-items: center; justify-content: center;
      font-size: 42px;
      box-shadow:
        0 0 0 12px rgba(26,86,219,.08),
        0 0 0 24px rgba(26,86,219,.04),
        0 20px 60px rgba(26,86,219,.25);
      animation: orbPulse 3s ease-in-out infinite;
    }
    @keyframes orbPulse {
      0%, 100% { box-shadow: 0 0 0 12px rgba(26,86,219,.08), 0 0 0 24px rgba(26,86,219,.04), 0 20px 60px rgba(26,86,219,.25); }
      50%       { box-shadow: 0 0 0 16px rgba(26,86,219,.12), 0 0 0 32px rgba(26,86,219,.06), 0 24px 80px rgba(26,86,219,.35); }
    }

    .welcome h2 {
      font-size: 28px; font-weight: 900;
      letter-spacing: -.5px;
      background: linear-gradient(135deg, var(--blue), var(--blue3));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .welcome p {
      font-size: 15px; color: var(--muted);
      max-width: 340px; line-height: 1.6;
    }

    /* Quick prompts */
    .quick-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      width: 100%; max-width: 500px;
      margin-top: 4px;
    }
    .quick-btn {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      text-align: left;
      cursor: pointer;
      transition: all .2s;
      font-family: 'Outfit', sans-serif;
    }
    .quick-btn:hover {
      border-color: var(--blue);
      box-shadow: 0 4px 16px var(--blue-glow);
      transform: translateY(-2px);
    }
    .quick-btn .q-icon { font-size: 18px; margin-bottom: 4px; display: block; }
    .quick-btn .q-text { font-size: 13px; font-weight: 600; color: var(--text); }
    .quick-btn .q-sub  { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* ── Messages ── */
    .msg {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      animation: msgIn .3s ease;
    }
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 32px; height: 32px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
    }
    .msg.ai   .msg-avatar { background: linear-gradient(135deg, var(--blue), var(--blue2)); }
    .msg.user .msg-avatar { background: #f1f5f9; }

    .msg-bubble {
      max-width: 72%;
      padding: 13px 16px;
      border-radius: 18px;
      font-size: 14px; line-height: 1.65;
      position: relative;
    }
    .msg.ai .msg-bubble {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-bottom-left-radius: 4px;
      color: var(--text);
      box-shadow: 0 2px 12px rgba(0,0,0,.05);
    }
    .msg.user .msg-bubble {
      background: var(--user-bg);
      color: #fff;
      border-bottom-right-radius: 4px;
      box-shadow: 0 4px 16px rgba(26,86,219,.3);
    }

    .msg-time {
      font-size: 10px;
      color: var(--muted);
      margin-top: 4px;
      text-align: right;
      font-family: 'JetBrains Mono', monospace;
    }
    .msg.ai .msg-time { text-align: left; }

    /* Typing indicator */
    .typing-indicator {
      display: none;
      align-items: flex-end; gap: 10px;
      animation: msgIn .3s ease;
    }
    .typing-indicator.show { display: flex; }
    .typing-bubble {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 18px; border-bottom-left-radius: 4px;
      padding: 14px 18px;
      display: flex; gap: 5px; align-items: center;
      box-shadow: 0 2px 12px rgba(0,0,0,.05);
    }
    .dot {
      width: 7px; height: 7px;
      background: var(--blue3);
      border-radius: 50%;
      animation: bounce 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(.8); opacity: .5; }
      40%            { transform: scale(1.2); opacity: 1; }
    }

    /* ── Input bar ── */
    .input-bar {
      padding: 14px 0 20px;
      flex-shrink: 0;
      background: rgba(240,245,255,.9);
      backdrop-filter: blur(12px);
    }

    .input-wrap {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: var(--white);
      border: 2px solid var(--border);
      border-radius: 18px;
      padding: 10px 10px 10px 18px;
      transition: border-color .2s, box-shadow .2s;
      box-shadow: 0 4px 24px rgba(26,86,219,.08);
    }
    .input-wrap:focus-within {
      border-color: var(--blue);
      box-shadow: 0 4px 24px rgba(26,86,219,.18);
    }

    #userInput {
      flex: 1;
      background: none;
      border: none; outline: none;
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      color: var(--text);
      resize: none;
      min-height: 24px; max-height: 120px;
      line-height: 1.5;
      padding: 2px 0;
    }
    #userInput::placeholder { color: #b0c0d8; }

    .btn-send {
      width: 44px; height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--blue), var(--blue2));
      border: none;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .2s;
      flex-shrink: 0;
      box-shadow: 0 4px 14px rgba(26,86,219,.35);
    }
    .btn-send:hover:not(:disabled) { transform: scale(1.06); box-shadow: 0 6px 20px rgba(26,86,219,.45); }
    .btn-send:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    .input-footer {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 8px; padding: 0 4px;
    }
    .input-hint {
      font-size: 11px; color: var(--muted);
    }
    .powered {
      font-size: 11px; color: var(--muted);
      display: flex; align-items: center; gap: 5px;
    }
    .powered-dot {
      width: 6px; height: 6px;
      background: #22c55e;
      border-radius: 50%;
      animation: blink 2s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: .3; }
    }

    /* Mobile */
    @media (max-width: 600px) {
      .quick-grid { grid-template-columns: 1fr; }
      .badge-model { display: none; }
      .msg-bubble { max-width: 86%; }
      .welcome h2 { font-size: 22px; }
    }
  </style>
</head>
<body>

<div class="bg-layer"></div>
<div class="bg-grid"></div>

<div class="layout">

  <!-- Header -->
  <header>
    <div class="header-left">
      <div class="ai-avatar">🤖</div>
      <div class="header-info">
        <h1>UNIO AI</h1>
        <p>Hazel Intelligence · <span>Online</span></p>
      </div>
    </div>
    <div class="header-right">
      <div class="badge-model" id="modelBadge">Llama 3.3 · 70B</div>
      <a href="/dashboard" class="btn-back">← Dashboard</a>
    </div>
  </header>

  <!-- Chat Area -->
  <div class="chat-area" id="chatArea">

    <!-- Welcome -->
    <div class="welcome" id="welcome">
      <div class="welcome-orb">🤖</div>
      <div>
        <h2>UNIO AI</h2>
        <p>Aapka personal wallet assistant. Koi bhi sawaal poochho — instant jawab milega.</p>
      </div>
      <div class="quick-grid">
        <button class="quick-btn" onclick="quickAsk('UNIO wallet ke features kya hain?')">
          <span class="q-icon">💼</span>
          <div class="q-text">Wallet Features</div>
          <div class="q-sub">UNIO kya kya kar sakta hai</div>
        </button>
        <button class="quick-btn" onclick="quickAsk('Lifafa system kaise kaam karta hai?')">
          <span class="q-icon">🧧</span>
          <div class="q-text">Lifafa System</div>
          <div class="q-sub">Gift envelope kaise bhejein</div>
        </button>
        <button class="quick-btn" onclick="quickAsk('Deposit kaise karein UNIO wallet mein?')">
          <span class="q-icon">💰</span>
          <div class="q-text">Deposit Guide</div>
          <div class="q-sub">Paise add karne ka tarika</div>
        </button>
        <button class="quick-btn" onclick="quickAsk('Transfer fail ho toh kya karein?')">
          <span class="q-icon">🔧</span>
          <div class="q-text">Transfer Help</div>
          <div class="q-sub">Problem solve karein</div>
        </button>
      </div>
    </div>

    <!-- Typing indicator -->
    <div class="typing-indicator" id="typingIndicator">
      <div class="msg-avatar" style="background:linear-gradient(135deg,#1a56db,#1e40af);width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;">🤖</div>
      <div class="typing-bubble">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>

  </div>

  <!-- Input Bar -->
  <div class="input-bar">
    <div class="input-wrap">
      <textarea id="userInput" placeholder="Koi bhi sawaal poochho UNIO ke baare mein..." rows="1" oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
      <button class="btn-send" id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
    <div class="input-footer">
      <span class="input-hint">Enter to send · Shift+Enter for new line</span>
      <span class="powered"><span class="powered-dot"></span>Powered by SambaNova AI</span>
    </div>
  </div>

</div>

<script>
  // ✅ FIX 1: API URL set kiya
  const API = 'https://unio-hazel.vercel.app';

  let chatHistory = [];
  let isLoading   = false;
  let welcomeHidden = false;

  // Model name display map
  const MODEL_LABELS = {
    'Meta-Llama-3.3-70B-Instruct':      'Llama 3.3 · 70B',
    'Meta-Llama-3.1-8B-Instruct':       'Llama 3.1 · 8B',
    'Qwen2.5-72B-Instruct':             'Qwen 2.5 · 72B',
    'Qwen2.5-Coder-32B-Instruct':       'Qwen Coder · 32B',
    'DeepSeek-R1-Distill-Llama-70B':    'DeepSeek R1 · 70B',
    'DeepSeek-V3-0324':                 'DeepSeek V3'
  };

  // ── Auto resize textarea ──────────────────────────────────────────────────
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  // ── Quick prompts ─────────────────────────────────────────────────────────
  function quickAsk(text) {
    document.getElementById('userInput').value = text;
    sendMessage();
  }

  // ── Time ─────────────────────────────────────────────────────────────────
  function getTime() {
    return new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
  }

  // ── Append message ────────────────────────────────────────────────────────
  function appendMsg(role, text) {
    if (!welcomeHidden) {
      document.getElementById('welcome').style.display = 'none';
      welcomeHidden = true;
    }

    const chatArea = document.getElementById('chatArea');
    const typingEl = document.getElementById('typingIndicator');

    const div = document.createElement('div');
    div.className = `msg ${role}`;

    const avatar = role === 'ai' ? '🤖' : '👤';
    const timeStr = getTime();

    const formatted = text.replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');

    div.innerHTML = `
      <div class="msg-avatar">${avatar}</div>
      <div>
        <div class="msg-bubble">${formatted}</div>
        <div class="msg-time">${timeStr}</div>
      </div>
    `;

    chatArea.insertBefore(div, typingEl);
    scrollBottom();
  }

  function scrollBottom() {
    const chatArea = document.getElementById('chatArea');
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function showTyping(show) {
    const el = document.getElementById('typingIndicator');
    el.classList.toggle('show', show);
    if (show) scrollBottom();
  }

  // ── Send message ──────────────────────────────────────────────────────────
  async function sendMessage() {
    if (isLoading) return;
    const input = document.getElementById('userInput');
    const msg   = input.value.trim();
    if (!msg) return;

    isLoading = true;
    input.value = '';
    input.style.height = 'auto';
    document.getElementById('sendBtn').disabled = true;

    appendMsg('user', msg);
    showTyping(true);

    try {
      // ✅ FIX 2: History mein current message nahi — backend khud add karta hai
      const res = await fetch(`${API}/ai/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: msg, history: chatHistory.slice(-10) })
      });

      const data = await res.json();
      showTyping(false);

      if (data.status === 'success') {
        appendMsg('ai', data.reply);

        // ✅ FIX 3: Response aane ke baad dono push karo
        chatHistory.push({ role: 'user', content: msg });
        chatHistory.push({ role: 'assistant', content: data.reply });

        // Update model badge if returned
        if (data.model && MODEL_LABELS[data.model]) {
          document.getElementById('modelBadge').textContent = MODEL_LABELS[data.model];
        }
      } else {
        appendMsg('ai', '❌ ' + (data.message || 'Kuch error aayi. Dobara try karo.'));
        chatHistory.push({ role: 'user', content: msg });
      }
    } catch (e) {
      showTyping(false);
      appendMsg('ai', '❌ Network error. Internet check karo aur dobara try karo.');
      chatHistory.push({ role: 'user', content: msg });
    }

    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
    input.focus();
  }
</script>
</body>
</html>
