<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password | UNIO</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#f0f4ff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem}
.card{background:white;border-radius:1.75rem;padding:2rem;max-width:400px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,0.08)}
.icon{font-size:2.5rem;text-align:center;margin-bottom:.75rem}
h1{font-size:1rem;font-weight:800;color:#0f172a;text-align:center;text-transform:uppercase;margin-bottom:.25rem}
.sub{font-size:.72rem;color:#94a3b8;font-weight:600;text-align:center;margin-bottom:1.5rem}
.input-group{margin-bottom:1.1rem}
.input-group label{display:block;font-size:.68rem;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.4rem}
.input-group input{width:100%;padding:.9rem 1.1rem;background:#f8fafc;border:2px solid #f1f5f9;border-radius:1rem;font-size:.9rem;font-weight:600;outline:none;font-family:inherit;transition:border .2s}
.input-group input:focus{border-color:#0057ff;background:white}
.btn{width:100%;padding:1rem;background:#0057ff;color:white;border:none;border-radius:1rem;font-size:.85rem;font-weight:800;text-transform:uppercase;cursor:pointer;font-family:inherit;transition:all .2s;margin-top:.25rem}
.btn:disabled{background:#94a3b8;cursor:not-allowed}
.btn:active:not(:disabled){transform:scale(.98)}
.msg{padding:.75rem 1rem;border-radius:.75rem;font-size:.75rem;font-weight:700;text-align:center;margin-top:1rem;display:none;line-height:1.6}
.msg.error{background:#fee2e2;color:#dc2626;display:block}
.msg.success{background:#dcfce7;color:#16a34a;display:block}
</style>
</head>
<body>
<div class="card">
  <div class="icon">🔐</div>
  <h1>Reset Password</h1>
  <p class="sub">Mobile number aur naya password enter karo</p>

  <div class="input-group">
    <label>Mobile Number</label>
    <input type="number" id="mobile" placeholder="Enter mobile number">
  </div>
  <div class="input-group">
    <label>New Password</label>
    <input type="password" id="newpass" placeholder="Enter new password">
  </div>

  <button class="btn" id="reset-btn" onclick="resetPassword()">Reset Password</button>
  <div class="msg" id="msg"></div>
</div>

<script>
const API = '';

async function resetPassword() {
  const mobile  = document.getElementById('mobile').value.trim();
  const newpass = document.getElementById('newpass').value.trim();
  const btn     = document.getElementById('reset-btn');
  const msg     = document.getElementById('msg');

  if(!mobile || mobile.length < 10) { showMsg('Valid mobile number enter karo!', 'error'); return; }
  if(!newpass || newpass.length < 4) { showMsg('Password kam se kam 4 characters ka hona chahiye!', 'error'); return; }

  btn.disabled     = true;
  btn.textContent  = 'Resetting...';

  try {
    const r = await fetch(API + '/admin/reset-password', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json', 'x-admin-key': '8435' },
      body:    JSON.stringify({ mobile, new_password: newpass })
    });
    const d = await r.json();
    if(d.status === 'success') {
      showMsg('✅ Password reset ho gaya!', 'success');
      document.getElementById('mobile').value  = '';
      document.getElementById('newpass').value = '';
    } else {
      showMsg('❌ ' + (d.message || 'Failed!'), 'error');
    }
  } catch(e) {
    showMsg('❌ Server error! Try again.', 'error');
  }

  btn.disabled    = false;
  btn.textContent = 'Reset Password';
}

function showMsg(text, type) {
  const m = document.getElementById('msg');
  m.textContent = text;
  m.className   = 'msg ' + type;
}
</script>
</body>
</html>
