<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>UNIO Circle</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
:root{
  --blue:#0057ff;--blue-mid:#1a4fd6;--blue-deep:#0a2463;--blue-light:#eff6ff;--blue-glow:#4fa3ff;
  --green:#16a34a;--green-light:#f0fdf4;
  --red:#dc2626;--red-light:#fee2e2;
  --orange:#ea580c;--orange-light:#fff7ed;
  --bg:#f0f4ff;--white:#ffffff;
  --text:#0f172a;--muted:#64748b;--border:#e2e8f0;--border-soft:#f1f5f9;
  --shadow:0 4px 24px rgba(0,87,255,.08);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);min-height:100vh;padding-bottom:90px;overflow-x:hidden}

/* ── Header ── */
.header{background:var(--white);padding:1rem 1.25rem;display:flex;align-items:center;gap:.85rem;box-shadow:0 1px 0 var(--border);position:sticky;top:0;z-index:100}
.btn-back{width:36px;height:36px;border-radius:50%;background:var(--blue-light);border:none;color:var(--blue);font-size:.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.header-title{font-size:1rem;font-weight:900;color:var(--text);letter-spacing:-.02em}
.header-sub{font-size:.62rem;font-weight:600;color:var(--muted)}
.header-logo{font-size:1.3rem;font-weight:900;color:var(--blue);font-style:italic;letter-spacing:-.03em;margin-left:auto}

.container{max-width:480px;margin:0 auto;padding:1.25rem 1rem}

/* ── Tab Bar ── */
.tab-bar{display:grid;grid-template-columns:1fr 1fr 1fr;background:var(--white);border-radius:1.25rem;padding:4px;gap:3px;margin-bottom:1.25rem;box-shadow:var(--shadow);border:1px solid var(--border)}
.tab{padding:.65rem .5rem;text-align:center;font-size:.62rem;font-weight:800;border-radius:1rem;cursor:pointer;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;transition:all .2s;position:relative}
.tab.active{background:var(--blue);color:white;box-shadow:0 4px 12px rgba(0,87,255,.3)}
.tab-badge{position:absolute;top:4px;right:6px;background:var(--red);color:white;font-size:.5rem;font-weight:900;padding:1px 5px;border-radius:20px;min-width:14px}

.section{display:none}
.section.active{display:block}

/* ── Circle Banner ── */
.circle-banner{background:linear-gradient(135deg,var(--blue-deep) 0%,var(--blue-mid) 55%,var(--blue-glow) 100%);border-radius:1.75rem;padding:1.5rem;color:white;margin-bottom:1.25rem;position:relative;overflow:hidden}
.circle-banner::before{content:'';position:absolute;top:-50px;right:-50px;width:160px;height:160px;background:rgba(255,255,255,.06);border-radius:50%}
.banner-top{display:flex;align-items:center;gap:.75rem;margin-bottom:.85rem;position:relative;z-index:1}
.banner-icon{width:48px;height:48px;background:rgba(255,255,255,.15);border-radius:1rem;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0}
.banner-title{font-size:1.1rem;font-weight:900;letter-spacing:-.02em}
.banner-desc{font-size:.7rem;opacity:.75;font-weight:500;margin-top:.15rem}
.banner-stats{display:flex;gap:1.25rem;position:relative;z-index:1}
.b-stat{text-align:center}
.b-stat-val{font-size:1.4rem;font-weight:900;letter-spacing:-1px}
.b-stat-lbl{font-size:.58rem;font-weight:700;opacity:.65;text-transform:uppercase;letter-spacing:.06em}

/* ── Card ── */
.card{background:var(--white);border-radius:1.25rem;border:1px solid var(--border);box-shadow:var(--shadow);margin-bottom:.85rem;overflow:hidden}
.card-header{padding:1rem 1.25rem .75rem;display:flex;align-items:center;gap:.6rem;border-bottom:1px solid var(--border-soft)}
.card-header-icon{width:32px;height:32px;border-radius:.65rem;display:flex;align-items:center;justify-content:center;font-size:.8rem;flex-shrink:0}
.card-header-title{font-size:.8rem;font-weight:800;color:var(--text)}
.card-body{padding:1.25rem}

/* ── Form ── */
.input-wrap{margin-bottom:.85rem}
.input-label{font-size:.6rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.3rem;display:block}
.input-row{position:relative}
.inp{width:100%;padding:.8rem 1rem;background:#f8faff;border:2px solid var(--border);border-radius:.85rem;font-family:'Plus Jakarta Sans',sans-serif;font-size:.88rem;font-weight:600;color:var(--text);outline:none;transition:all .2s}
.inp:focus{border-color:var(--blue);background:white;box-shadow:0 0 0 3px rgba(0,87,255,.08)}
.name-chip{display:none;align-items:center;gap:.4rem;background:var(--blue-light);border-radius:.5rem;padding:.35rem .75rem;font-size:.72rem;font-weight:700;color:var(--blue);margin-top:.4rem}
.name-chip.show{display:flex}

/* ── Mode Toggle ── */
.mode-toggle{display:grid;grid-template-columns:1fr 1fr;background:#f1f5f9;border-radius:.85rem;padding:3px;gap:3px;margin-bottom:.85rem}
.mode-opt{padding:.65rem;text-align:center;font-size:.65rem;font-weight:800;border-radius:.75rem;cursor:pointer;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;transition:all .2s}
.mode-opt.active{background:var(--white);color:var(--blue);box-shadow:0 2px 8px rgba(0,0,0,.07)}
.mode-desc{font-size:.65rem;color:var(--muted);font-weight:600;text-align:center;margin-bottom:.85rem;padding:0 .5rem;line-height:1.5}

/* ── Buttons ── */
.btn{width:100%;padding:.9rem;border:none;border-radius:.9rem;font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:.76rem;text-transform:uppercase;letter-spacing:.08em;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.45rem;transition:all .2s}
.btn:active:not(:disabled){transform:scale(.97)}
.btn-blue{background:linear-gradient(135deg,var(--blue-mid),var(--blue-glow));color:white;box-shadow:0 6px 20px rgba(0,87,255,.3)}
.btn-green{background:linear-gradient(135deg,var(--green),#22c55e);color:white}
.btn-red{background:linear-gradient(135deg,#dc2626,#f87171);color:white}
.spin{width:15px;height:15px;border:2.5px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;display:none}
.btn.loading .spin{display:block}
.btn.loading .btn-text{display:none}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── List Styles ── */
.member-item{padding:1rem 1.25rem;display:flex;align-items:center;gap:.85rem;border-bottom:1px solid var(--border-soft)}
.member-avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--blue-mid));color:white;display:flex;align-items:center;justify-content:center;font-weight:800}
.member-name{font-size:.82rem;font-weight:800}
.member-actions{margin-left:auto;display:flex;gap:.5rem}
.status-badge{font-size:.55rem;font-weight:800;padding:.2rem .6rem;border-radius:20px;text-transform:uppercase}
.s-active{background:var(--green-light);color:var(--green)}

/* ── Receipt ── */
.receipt-overlay{position:fixed;inset:0;background:rgba(10,36,99,.6);backdrop-filter:blur(8px);z-index:300;display:none;align-items:center;justify-content:center;padding:1rem}
.receipt-overlay.open{display:flex}
.receipt-box{background:var(--white);border-radius:2rem;padding:1.75rem 1.5rem;width:100%;max-width:380px}
.receipt-row{display:flex;justify-content:space-between;padding:.7rem 1rem;border-bottom:1px solid var(--border-soft)}

.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--text);color:white;padding:.7rem 1.25rem;border-radius:2rem;font-size:.78rem;font-weight:700;opacity:0;transition:all .3s;z-index:500}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-10px)}
</style>
</head>
<body>

<div class="header">
  <button class="btn-back" onclick="history.back()"><i class="fa-solid fa-arrow-left"></i></button>
  <div>
    <div class="header-title">UNIO Circle</div>
    <div class="header-sub">Trusted payment group</div>
  </div>
  <div class="header-logo">UNIO</div>
</div>

<div class="container">
  <div class="circle-banner">
    <div class="banner-top">
      <div class="banner-icon"><i class="fa-solid fa-circle-nodes"></i></div>
      <div><div class="banner-title">My Circle</div><div class="banner-desc">Manage your trusted payers</div></div>
    </div>
    <div class="banner-stats">
      <div class="b-stat"><div class="b-stat-val" id="stat-members">0</div><div class="b-stat-lbl">Members</div></div>
      <div class="b-stat"><div class="b-stat-val" id="stat-payers">0</div><div class="b-stat-lbl">My Payers</div></div>
      <div class="b-stat"><div class="b-stat-val" id="stat-pending">0</div><div class="b-stat-lbl">Pending</div></div>
    </div>
  </div>

  <div class="tab-bar">
    <div class="tab active" onclick="switchTab('circle',this)"><i class="fa-solid fa-users"></i><br>My Circle</div>
    <div class="tab" onclick="switchTab('payers',this)"><i class="fa-solid fa-hand-holding-dollar"></i><br>My Payers</div>
    <div class="tab" onclick="switchTab('pay',this)"><i class="fa-solid fa-paper-plane"></i><br>Pay Now</div>
  </div>

  <div class="section active" id="sec-circle">
    <div class="card">
      <div class="card-header"><div class="card-header-title">Add to Circle</div></div>
      <div class="card-body">
        <div class="input-wrap">
          <label class="input-label">Mobile Number</label>
          <input class="inp" type="tel" id="invite-mobile" maxlength="10" placeholder="10-digit number">
        </div>
        <div class="mode-toggle">
          <div class="mode-opt active" id="mode-approve" onclick="setMode('approve')">Approve</div>
          <div class="mode-opt" id="mode-auto" onclick="setMode('auto')">Auto</div>
        </div>
        <button class="btn btn-blue" id="invite-btn" onclick="sendInvite()">Send Invite</button>
      </div>
    </div>
    <div id="circle-list"></div>
  </div>

  <div class="section" id="sec-payers">
    <div id="payers-list"></div>
  </div>

  <div class="section" id="sec-pay">
    <div class="card">
      <div class="card-body">
        <div class="input-wrap"><label class="input-label">Pay From (Mobile)</label><input class="inp" id="pay-mobile" placeholder="Payer Mobile"></div>
        <div class="input-wrap"><label class="input-label">Amount</label><input class="inp" id="pay-amount" type="number" placeholder="₹ 0.00"></div>
        <button class="btn btn-green" id="quick-pay-btn" onclick="doQuickPay()">Pay Now</button>
      </div>
    </div>
  </div>
</div>

<div class="receipt-overlay" id="receipt-overlay">
  <div class="receipt-box">
    <div class="receipt-row"><span class="r-label">Status</span><span id="r-status">Success</span></div>
    <div class="receipt-row"><span class="r-label">Amount</span><span id="r-amount">₹0</span></div>
    <button class="btn btn-blue" onclick="closeReceipt()" style="margin-top:1rem">Close</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://unio-hazel.vercel.app/api'; // Replace with your actual API endpoint
const token = localStorage.getItem('token');
let currentMode = 'approve';

function switchTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  el.classList.add('active');
  document.getElementById(`sec-${tab}`).classList.add('active');
}

function setMode(mode) {
  currentMode = mode;
  document.getElementById('mode-approve').classList.toggle('active', mode === 'approve');
  document.getElementById('mode-auto').classList.toggle('active', mode === 'auto');
}

async function sendInvite() {
  const mobile = document.getElementById('invite-mobile').value;
  if(mobile.length !== 10) return toast("Invalid Mobile", "error");
  
  toast("Sending Invite...");
  // Logic for API call /circle/invite would go here
}

async function doQuickPay() {
  const mobile = document.getElementById('pay-mobile').value;
  const amount = document.getElementById('pay-amount').value;
  if(!mobile || !amount) return toast("Fill all fields", "error");

  document.getElementById('r-amount').innerText = "₹" + amount;
  document.getElementById('receipt-overlay').classList.add('open');
}

function closeReceipt() { document.getElementById('receipt-overlay').classList.remove('open'); }

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
