<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Payment | Secure Deposit</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f4f7f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #fff; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 100%; max-width: 380px; text-align: center; }
        .brand { font-size: 22px; font-weight: 700; color: #2d3436; margin-bottom: 25px; display: block; }
        .input-group { text-align: left; margin-bottom: 15px; }
        label { font-size: 13px; color: #636e72; font-weight: 600; margin-bottom: 5px; display: block; }
        input { width: 100%; padding: 12px; border: 1px solid #dfe6e9; border-radius: 8px; font-size: 15px; outline: none; transition: 0.2s; }
        input:focus { border-color: #0984e3; box-shadow: 0 0 0 2px rgba(9,132,227,0.1); }
        .pay-button { width: 100%; padding: 14px; background: #0984e3; color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 15px; }
        .pay-button:hover { background: #0873c4; }
        .secure { font-size: 11px; color: #b2bec3; margin-top: 20px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="card">
    <span class="brand">COURSE PAYMENT</span>
    
    <div class="input-group">
        <label>Mobile Number</label>
        <input type="tel" id="mobile" placeholder="Enter 10 digit number" maxlength="10">
    </div>

    <div class="input-group">
        <label>Amount (INR)</label>
        <input type="number" id="amt" placeholder="Enter Amount">
    </div>

    <button id="pay-btn" class="pay-button">Pay Now</button>

    <p class="secure">🔒 Secure 256-bit SSL Payment</p>
</div>

<script>
    document.getElementById('pay-btn').onclick = function(e) {
        var amount = document.getElementById('amt').value;
        var mobile = document.getElementById('mobile').value;

        // Validation
        if(mobile.length !== 10) {
            alert("Kripya 10 digit ka sahi mobile number bharein!");
            return;
        }
        if(!amount || amount < 1) {
            alert("Kripya sahi amount bharein!");
            return;
        }

        var options = {
            "key": "rzp_live_S2cTUqt8rUwR4H", // 👈 Apni Live Key ID yahan daalein
            "amount": amount * 100, 
            "currency": "INR",
            "name": "Course Deposit",
            "description": "Payment for Mobile: " + mobile,
            "handler": function (response){
                alert("Payment Successful! ID: " + response.razorpay_payment_id);
                window.location.href = "success.html?id=" + response.razorpay_payment_id;
            },
            "prefill": {
                "contact": mobile
            },
            "notes": {
                "user_mobile": mobile
            },
            "theme": {
                "color": "#0984e3"
            }
        };
        var rzp = new Razorpay(options);
        rzp.open();
        e.preventDefault();
    }
</script>

</body>
</html>
