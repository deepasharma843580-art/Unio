<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin | UNIO</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#0a0f1e;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.25rem}
.card{background:#141927;border-radius:2rem;padding:2.5rem;width:100%;max-width:360px;border:1px solid rgba(255,255,255,0.08)}
.logo{text-align:center;margin-bottom:2rem}
.logo h1{font-size:2rem;font-weight:900;color:#0057ff;font-style:italic}
.logo p{font-size:.7rem;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.2em;margin-top:4px}
.err{background:rgba(220,38,38,0.15);color:#dc2626;border:1px solid rgba(220,38,38,0.3);border-radius:.75rem;padding:.6rem 1rem;font-size:.75rem;font-weight:700;text-align:center;margin-bottom:1rem;display:none}
.err.show{display:block}
input{width:100%;padding:1rem 1.25rem;background:#1e2535;border:2px solid rgba(255,255,255,0.08);border-radius:1rem;font-size:1.5rem;font-weight:800;color:white;outline:none;text-align:center;letter-spacing:.3em;font-family:inherit;margin-bottom:1rem}
input:focus{border-color:#0057ff}
button{width:100%;padding:1rem;background:#0057ff;color:white;border:none;border-radius:1rem;font-size:.85rem;font-weight:800;text-transform:uppercase;cursor:pointer;font-family:inherit;transition:all .2s}
button:active{transform:scale(.98)}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>UNIO</h1>
    <p>Admin Panel</p>
  </div>
  <div class="err" id="err">❌ Wrong Password!</div>
  <input type="password" id="pass" placeholder="••••" maxlength="6"
    onkeydown="if(event.key==='Enter') login()">
  <button onclick="login()">
    <i class="fa-solid fa-lock"></i> Enter Admin
  </button>
</div>

<script>
function login() {
  const pass = document.getElementById('pass').value;
  if(pass === '8435') {
    sessionStorage.setItem('admin_ok', '1');
    window.location.href = 'admindash.html';
  } else {
    document.getElementById('err').classList.add('show');
    document.getElementById('pass').value = '';
    setTimeout(() => document.getElementById('err').classList.remove('show'), 2000);
  }
}
</script>
</body>
</html>
