<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin | UNIO</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root { --primary: #0066ff; --bg: #f8fafc; --card: #ffffff; --border: #e2e8f0; --text: #1e293b; --success: #10b981; --danger: #ef4444; }
* { margin:0; padding:0; box-sizing:border-box; font-family:'Inter', sans-serif; }
body { background: var(--bg); color: var(--text); }

/* Login */
#login-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); z-index:1000; display:flex; align-items:center; justify-content:center; }
.login-box { background:var(--card); padding:2rem; border-radius:12px; box-shadow:0 4px 15px rgba(0,0,0,0.05); width:90%; max-width:350px; text-align:center; border:1px solid var(--border); }

/* Layout */
.header { background:var(--card); padding:1rem 5%; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:99; }
.container { max-width:1100px; margin:20px auto; padding:0 15px; display:none; }

/* Table Style */
.card { background:var(--card); border-radius:12px; padding:20px; border:1px solid var(--border); overflow-x:auto; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
table { width:100%; border-collapse:collapse; margin-top:10px; min-width:700px; }
th { text-align:left; padding:12px; color:#64748b; font-size:0.75rem; text-transform:uppercase; border-bottom:2px solid var(--border); }
td { padding:14px 12px; border-bottom:1px solid var(--border); font-size:0.85rem; font-weight:500; }

/* Action Buttons */
.btn { padding:7px 14px; border:none; border-radius:6px; cursor:pointer; font-weight:700; font-size:0.75rem; color:white; transition: 0.2s; }
.btn-app { background: var(--success); }
.btn-rej { background: var(--danger); margin-left:5px; }
.btn:active { transform: scale(0.95); }
.input-field { width:100%; padding:10px; border:1px solid var(--border); border-radius:8px; margin-bottom:15px; outline:none; text-align:center; }

/* Tabs */
.tabs { display:flex; gap:10px; margin-bottom:20px; overflow-x:auto; padding-bottom:5px; }
.tab { padding:8px 20px; background:var(--card); border:1px solid var(--border); border-radius:25px; cursor:pointer; font-size:0.8rem; font-weight:600; white-space:nowrap; }
.tab.active { background:var(--primary); color:white; border-color:var(--primary); }
</style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <h2 style="color:var(--primary); margin-bottom:20px;">UNIO ADMIN</h2>
        <input type="password" id="admin-pin" class="input-field" placeholder="Enter Admin PIN">
        <button onclick="checkLogin()" class="btn" style="background:var(--primary); width:100%; padding:12px;">Login Dashboard</button>
    </div>
</div>

<div class="header">
    <h2 style="color:var(--primary); font-size:1.1rem;">Deposit Management</h2>
    <span id="status-tag" style="font-size:0.7rem; color:var(--success); font-weight:700;">● SYSTEM ACTIVE</span>
</div>

<div class="container" id="main-content">
    <div class="tabs">
        <div class="tab active" onclick="switchTab('dep-tab')">New Requests</div>
        <div class="tab" onclick="switchTab('user-tab')">User List</div>
    </div>

    <div id="dep-tab" class="tab-content">
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h3 style="font-size:0.95rem;">Pending Deposits</h3>
                <button onclick="loadDeposits()" style="background:none; border:none; color:var(--primary); font-weight:700; cursor:pointer; font-size:0.8rem;">Refresh List</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Mobile Number</th>
                        <th>Amount</th>
                        <th>UTR / Remark</th>
                        <th>Time</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="deposit-list">
                    </tbody>
            </table>
        </div>
    </div>

    <div id="user-tab" class="tab-content" style="display:none;">
        <div class="card">
            <h3>Registered Users</h3>
            <table>
                <thead><tr><th>Name</th><th>Mobile</th><th>Balance</th></tr></thead>
                <tbody id="user-list"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
const API = ''; // Yahan apni API Link dalein
const PIN = '8435';

function checkLogin() {
    if(document.getElementById('admin-pin').value === PIN) {
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        loadDeposits();
    } else { alert("Incorrect PIN!"); }
}

function switchTab(id) {
    document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(id).style.display = 'block';
    event.currentTarget.classList.add('active');
    if(id === 'user-tab') loadUsers();
}

// 1. LOAD DEPOSITS (Only Status: Pending)
async function loadDeposits() {
    const list = document.getElementById('deposit-list');
    list.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:30px; color:#64748b;">Fetching requests...</td></tr>';
    
    try {
        const r = await fetch(API + '/admin/transactions', { headers: {'x-admin-key': PIN} });
        const d = await r.json();
        
        // Sirf pending deposit filter karein
        const pending = (d.transactions || []).filter(t => t.status === 'pending');
        
        if(pending.length === 0) {
            list.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:30px; color:#64748b;">No pending requests found.</td></tr>';
            return;
        }

        list.innerHTML = '';
        pending.forEach(t => {
            const row = document.createElement('tr');
            row.id = `row-${t._id}`;
            const time = new Date(t.tx_time).toLocaleString('en-IN', {hour:'2-digit', minute:'2-digit', day:'2-digit', month:'short'});
            
            row.innerHTML = `
                <td>${t.receiver_id?.mobile || 'N/A'}</td>
                <td style="color:var(--primary); font-weight:800;">₹${t.amount}</td>
                <td style="font-family:monospace; font-size:0.8rem; color:#64748b;">${t.remark || '-'}</td>
                <td style="font-size:0.75rem; color:#94a3b8;">${time}</td>
                <td>
                    <button class="btn btn-app" onclick="handleDeposit('${t._id}', 'approve')">Approve</button>
                    <button class="btn btn-rej" onclick="handleDeposit('${t._id}', 'reject')">Reject</button>
                </td>
            `;
            list.appendChild(row);
        });
    } catch(e) { 
        list.innerHTML = '<tr><td colspan="5" style="text-align:center; color:var(--danger);">Connection Error! Check API link.</td></tr>'; 
    }
}

// 2. APPROVE / REJECT DEPOSIT (INSTANT REMOVE)
async function handleDeposit(id, type) {
    const row = document.getElementById(`row-${id}`);
    const actionName = type === 'approve' ? 'Approve' : 'Reject';
    
    if(!confirm(`${actionName} this deposit request?`)) return;

    row.style.opacity = '0.3'; // Visual loading
    row.style.pointerEvents = 'none';

    const endpoint = type === 'approve' ? `/admin/approve-deposit/${id}` : `/admin/reject-deposit/${id}`;

    try {
        const r = await fetch(API + endpoint, {
            method: 'POST',
            headers: { 'x-admin-key': PIN }
        });
        const res = await r.json();

        if(res.status === 'success') {
            // SUCCESS: List se turant hata do (Ab refresh pe nahi aayega kyunki DB status change ho gaya)
            row.remove();
            
            // Agar list khali ho jaye to refresh message dikhao
            if(document.getElementById('deposit-list').children.length === 0) {
                document.getElementById('deposit-list').innerHTML = '<tr><td colspan="5" style="text-align:center; padding:30px; color:#64748b;">All requests processed.</td></tr>';
            }
        } else {
            alert("Error: " + res.message);
            row.style.opacity = '1';
            row.style.pointerEvents = 'auto';
        }
    } catch(e) {
        alert("Server Error! Check your Backend.");
        row.style.opacity = '1';
        row.style.pointerEvents = 'auto';
    }
}

async function loadUsers() {
    const list = document.getElementById('user-list');
    try {
        const r = await fetch(API + '/admin/users', { headers: {'x-admin-key': PIN} });
        const d = await r.json();
        list.innerHTML = d.users.map(u => `<tr><td>${u.name}</td><td>${u.mobile}</td><td style="color:var(--primary); font-weight:700;">₹${parseFloat(u.balance||0).toFixed(2)}</td></tr>`).join('');
    } catch(e) {}
}
</script>
</body>
</html>
