<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Terms & Conditions — UNIO Wallet</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    :root {
      --primary: #1a3cff;
      --primary-dark: #0a24cc;
      --bg: #f0f3ff;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --accent: #e8ecff;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    #root { min-height: 100vh; }

    @keyframes fadeUp   { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn   { from { opacity:0; } to { opacity:1; } }
    @keyframes shimmer  { 0% { background-position:-400px 0; } 100% { background-position:400px 0; } }
    @keyframes pulseRing{ 0%{box-shadow:0 0 0 0 rgba(26,60,255,.25);}70%{box-shadow:0 0 0 10px rgba(26,60,255,0);}100%{box-shadow:0 0 0 0 rgba(26,60,255,0);} }

    /* ── HEADER ── */
    header {
      background: linear-gradient(140deg, #0714a8 0%, #1a3cff 55%, #4060ff 100%);
      padding: 52px 20px 40px; text-align: center; position: relative; overflow: hidden;
    }
    header::before {
      content:''; position:absolute; inset:0;
      background: radial-gradient(ellipse at 65% -10%, rgba(255,255,255,.08) 0%, transparent 60%),
                  radial-gradient(ellipse at 10% 90%,  rgba(255,255,255,.04) 0%, transparent 50%);
    }
    .h-logo { font-family:'Sora',sans-serif; font-size:2.6rem; font-weight:800; letter-spacing:6px; color:#fff; position:relative;
      animation: fadeUp .5s cubic-bezier(.22,.68,0,1.2) both; }
    .h-sub  { font-size:.88rem; opacity:.7; color:#fff; font-weight:300; position:relative; margin-top:6px;
      animation: fadeUp .5s .1s cubic-bezier(.22,.68,0,1.2) both; }
    .h-badge { display:inline-flex; align-items:center; gap:6px; margin-top:18px; background:rgba(255,255,255,.12);
      border:1px solid rgba(255,255,255,.2); border-radius:20px; padding:5px 14px; font-size:.78rem; color:rgba(255,255,255,.85);
      font-family:'Sora',sans-serif; font-weight:600; position:relative;
      animation: fadeUp .5s .18s cubic-bezier(.22,.68,0,1.2) both; }

    /* ── CONTAINER ── */
    .wrap { max-width:800px; margin:32px auto 70px; padding:0 18px; }

    /* ── CARDS ── */
    .card {
      background:#fff; border-radius:20px; padding:28px 30px;
      box-shadow:0 2px 18px rgba(26,60,255,.06); margin-bottom:14px;
      border:1px solid rgba(26,60,255,.07);
      transition: box-shadow .2s, transform .2s;
      animation: fadeUp .5s cubic-bezier(.22,.68,0,1.2) both;
    }
    .card:hover { box-shadow:0 8px 32px rgba(26,60,255,.12); transform:translateY(-2px); }

    .card-title {
      font-family:'Sora',sans-serif; font-size:1.05rem; font-weight:700;
      color:var(--primary); margin-bottom:16px;
      display:flex; align-items:center; gap:12px;
    }
    .card-title .num {
      background:var(--accent); color:var(--primary);
      width:30px; height:30px; border-radius:9px;
      display:flex; align-items:center; justify-content:center;
      font-size:.78rem; font-weight:800; flex-shrink:0;
    }
    .card-title .icon-wrap {
      width:36px; height:36px; border-radius:10px;
      background:var(--accent); display:flex; align-items:center;
      justify-content:center; font-size:1.1rem; flex-shrink:0;
    }

    p.body  { color:var(--muted); font-size:.91rem; line-height:1.8; margin-bottom:10px; }
    ul.body { list-style:none; padding:0; }
    ul.body li { color:var(--muted); font-size:.91rem; line-height:1.75; padding:6px 0 6px 24px; position:relative; border-bottom:1px solid #f1f5f9; }
    ul.body li:last-child { border-bottom:none; }
    ul.body li::before { content:'›'; color:var(--primary); position:absolute; left:0; font-weight:700; font-size:1.15rem; line-height:1.75; }

    /* ── BADGES ── */
    .badge { display:inline-block; background:var(--accent); color:var(--primary); font-size:.72rem; font-weight:700; padding:3px 11px; border-radius:20px; }

    /* ── INFO BOXES ── */
    .box { border-radius:12px; padding:14px 16px; margin-top:14px; font-size:.84rem; line-height:1.65; }
    .box-green  { background:#f0fdf4; border:1px solid #bbf7d0; color:#166534; }
    .box-yellow { background:#fffbeb; border:1px solid #fde68a; color:#92400e; }
    .box-blue   { background:#eff6ff; border:1px solid #bfdbfe; color:#1e40af; }
    .box strong { font-weight:700; }

    /* ── API BLOCKS ── */
    .api-block { background:#0f172a; border-radius:12px; padding:14px 18px; margin:12px 0; font-family:'Courier New',monospace; font-size:.82rem; color:#e2e8f0; position:relative; overflow:hidden; }
    .api-block::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,#1a3cff,#60a5fa,#1a3cff); background-size:400px 2px; animation:shimmer 2.5s infinite linear; }
    .method { display:inline-block; padding:2px 10px; border-radius:6px; font-size:.7rem; font-weight:800; margin-right:8px; font-family:'Sora',sans-serif; }
    .m-post { background:rgba(16,185,129,.15); color:#10b981; }
    .m-get  { background:rgba(96,165,250,.15); color:#60a5fa; }

    .json-res { background:#0f172a; border-radius:12px; padding:16px 18px; margin:10px 0; font-family:'Courier New',monospace; font-size:.81rem; line-height:1.9; position:relative; overflow:hidden; }
    .json-res::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,#10b981,#60a5fa,#10b981); background-size:400px 2px; animation:shimmer 3s infinite linear; }
    .jk { color:#7dd3fc; } .jv { color:#fde68a; } .jp { color:#94a3b8; } .jb { color:#86efac; }

    /* ── PARAM TABLE ── */
    .ptbl { width:100%; border-collapse:collapse; font-size:.83rem; margin-top:12px; border-radius:10px; overflow:hidden; }
    .ptbl thead tr { background:var(--accent); }
    .ptbl th { text-align:left; padding:9px 12px; color:var(--primary); font-weight:700; font-family:'Sora',sans-serif; font-size:.76rem; text-transform:uppercase; letter-spacing:.04em; }
    .ptbl td { padding:9px 12px; color:var(--muted); border-bottom:1px solid #f1f5f9; vertical-align:top; }
    .ptbl tbody tr:last-child td { border-bottom:none; }
    .ptbl tbody tr:hover td { background:#fafbff; }
    .pk { font-family:'Courier New',monospace; color:var(--primary); font-weight:600; font-size:.85rem; }
    .rb { background:#fee2e2; color:#dc2626; font-size:.67rem; font-weight:700; padding:2px 8px; border-radius:5px; }
    .ob { background:#f0fdf4; color:#16a34a; font-size:.67rem; font-weight:700; padding:2px 8px; border-radius:5px; }

    /* ── STATUS PILLS ── */
    .pill-y { background:#fef9c3; color:#854d0e; padding:3px 10px; border-radius:6px; font-size:.77rem; font-weight:700; display:inline-block; }
    .pill-g { background:#dcfce7; color:#15803d; padding:3px 10px; border-radius:6px; font-size:.77rem; font-weight:700; display:inline-block; }
    .pill-r { background:#fee2e2; color:#b91c1c; padding:3px 10px; border-radius:6px; font-size:.77rem; font-weight:700; display:inline-block; }

    /* ── HOW IT WORKS ── */
    .steps { background:linear-gradient(135deg,#f0f3ff,#e8ecff); border-radius:14px; padding:18px 20px; margin:16px 0; border:1px solid rgba(26,60,255,.1); }
    .steps-title { font-family:'Sora',sans-serif; font-size:.75rem; font-weight:800; color:var(--primary); text-transform:uppercase; letter-spacing:.06em; margin-bottom:12px; }
    .step { display:flex; gap:12px; align-items:flex-start; margin-bottom:10px; }
    .step:last-child { margin-bottom:0; }
    .step-n { background:var(--primary); color:#fff; border-radius:7px; width:22px; height:22px; display:flex; align-items:center; justify-content:center; font-size:.7rem; font-weight:800; flex-shrink:0; margin-top:1px; }
    .step-t { font-size:.87rem; color:var(--muted); line-height:1.55; }

    /* ── SECTION LABEL ── */
    .slabel { margin:18px 0 8px; font-family:'Sora',sans-serif; font-size:.74rem; font-weight:800; color:var(--primary); text-transform:uppercase; letter-spacing:.06em; display:flex; align-items:center; gap:7px; }
    .slabel::after { content:''; flex:1; height:1px; background:var(--accent); }

    /* ── TOC ── */
    .toc-card { background:linear-gradient(145deg,#f5f7ff,#eaedff); border:1px solid rgba(26,60,255,.1); }
    .toc-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-top:4px; }
    @media(max-width:500px){ .toc-grid{ grid-template-columns:1fr; } }
    .toc-item { display:flex; align-items:center; gap:8px; padding:8px 10px; border-radius:10px; color:var(--muted); font-size:.85rem; transition:background .15s, color .15s; }
    .toc-item:hover { background:var(--accent); color:var(--primary); }
    .toc-n { background:var(--primary); color:#fff; width:20px; height:20px; border-radius:5px; display:flex; align-items:center; justify-content:center; font-size:.67rem; font-weight:800; flex-shrink:0; }

    /* ── AI BOX ── */
    .ai-box { background:linear-gradient(135deg,#0714a8 0%,#1a3cff 100%); border-radius:20px; padding:26px 28px; display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; box-shadow:0 8px 36px rgba(26,60,255,.28); margin-bottom:14px; animation:fadeUp .5s .8s cubic-bezier(.22,.68,0,1.2) both; }
    .ai-icon { width:54px; height:54px; background:rgba(255,255,255,.14); border-radius:15px; display:flex; align-items:center; justify-content:center; font-size:28px; flex-shrink:0; animation:pulseRing 2.5s infinite; }
    .ai-btn { background:#fff; color:var(--primary); font-family:'Sora',sans-serif; font-size:.82rem; font-weight:700; padding:12px 26px; border-radius:12px; text-decoration:none; white-space:nowrap; flex-shrink:0; box-shadow:0 2px 14px rgba(0,0,0,.12); transition:transform .15s, box-shadow .15s; }
    .ai-btn:hover { transform:translateY(-2px); box-shadow:0 4px 22px rgba(0,0,0,.18); }

    /* ── PROGRESS BAR ── */
    .pbar { position:fixed; top:0; left:0; height:3px; background:linear-gradient(90deg,#1a3cff,#60a5fa); z-index:9999; transition:width .1s; border-radius:0 2px 2px 0; }

    /* ── FOOTER ── */
    .footer { text-align:center; color:var(--muted); font-size:.78rem; padding-bottom:40px; margin-top:8px; animation:fadeIn .4s 1s both; }
    .divider { height:1px; background:linear-gradient(90deg,transparent,var(--border),transparent); margin:6px 0 20px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const sections = [
  {
    id:1, icon:"🏦", title:"About UNIO Wallet",
    body: () => <p className="body">UNIO Wallet is an independent private digital wallet platform. It is not affiliated with, endorsed by, or regulated by the Reserve Bank of India (RBI) or any other government or financial authority. UNIO Wallet operates as a self-contained platform for internal transactions only.</p>
  },
  {
    id:2, icon:"☁️", title:"Hosting & Compliance",
    body: () => <p className="body">UNIO Wallet is hosted on Vercel. We fully comply with all terms, conditions, and policies of Vercel hosting. Any service interruptions caused by the hosting provider are beyond our control.</p>
  },
  {
    id:3, icon:"💰", title:"Wallet Balance",
    body: () => <ul className="body">
      <li>Wallet balance can only be used within the UNIO platform.</li>
      <li>Balance can be added via UPI payment to the platform admin.</li>
      <li>Minimum withdrawal amount is ₹10.</li>
      <li>Withdrawals are processed to your UPI ID manually within 48 hours.</li>
    </ul>
  },
  {
    id:4, icon:"💳", title:"Payments & Withdrawals",
    body: () => <>
      <ul className="body">
        <li>All withdrawals are processed manually by the platform admin.</li>
        <li>There is <strong style={{color:'#15803d'}}>no tax, no deduction, and no service fee</strong> on any withdrawal — you receive the full amount.</li>
        <li>Wallet-to-wallet payments via UNIO Gateway are instant with zero fees.</li>
        <li>If withdrawal is not received within 48 hours, contact support via the Help section.</li>
        <li>UNIO Wallet reserves the right to delay or cancel suspicious transactions.</li>
      </ul>
      <div className="box box-green" style={{marginTop:'14px'}}>
        <strong>✅ Zero Fee Policy —</strong> UNIO Wallet charges no tax or service fee on withdrawals or wallet payments. What you request is what you receive.
      </div>
    </>
  },
  {
    id:5, icon:"🎁", title:"Giveaway & Lifafa",
    body: () => <ul className="body">
      <li>Users can create giveaways using their own wallet balance.</li>
      <li>Telegram channel owners can connect their channel to run giveaways.</li>
      <li>UNIO Wallet is not responsible for giveaways created by users.</li>
      <li>All giveaway payouts come from the creator's wallet balance.</li>
    </ul>
  },
  {
    id:6, icon:"🔐", title:"Account Security",
    body: () => <ul className="body">
      <li>Users are responsible for keeping their PIN and password secure.</li>
      <li>Passwords are stored in encrypted (hashed) format.</li>
      <li>UNIO Wallet is not responsible for unauthorized access due to user negligence.</li>
      <li>Do not share your login credentials, PIN, or password with anyone.</li>
    </ul>
  },
  {
    id:7, icon:"🎟️", title:"Gift Code Redemption",
    body: () => <>
      <p className="body">Every UNIO Wallet user can redeem gift codes to instantly receive wallet balance. Gift codes are issued by the platform or admins.</p>
      <ul className="body">
        <li>Each gift code can only be redeemed once per user.</li>
        <li>Expired or invalid codes will return an error.</li>
        <li>Redeemed balance is instantly credited to the wallet.</li>
        <li>Gift codes cannot be exchanged for cash or transferred.</li>
        <li>UNIO Wallet reserves the right to invalidate any code at any time.</li>
        <li>Attempting to brute-force or enumerate codes will result in a permanent ban.</li>
      </ul>
      <div className="box box-yellow">
        <strong>Note:</strong> Bulk redemption abuse or unauthorized code sharing may result in immediate account suspension.
      </div>
    </>
  },
  {
   id:8, icon:"🏪", title:"Payment Gateway (Collect Payments)",
    body: () => <>
      <p className="body">Every UNIO Wallet user gets a personal Payment Gateway — collect payments from any UNIO user directly into your wallet. No third-party, no admin approval, instant settlement.</p>

      <div className="steps">
        <div className="steps-title">How It Works</div>
        {[
          ['1','Create an invoice via API — get a payment_url instantly'],
          ['2','Share the payment_url or embed it in your website / Telegram bot'],
          ['3','Payer opens the link and enters their UNIO mobile number + password + 4-digit PIN'],
          ['4','Amount is instantly deducted from payer\'s wallet and credited to yours'],
        ].map(([n,t]) => (
          <div key={n} className="step">
            <span className="step-n">{n}</span>
            <span className="step-t">{t}</span>
          </div>
        ))}
      </div>

      <div className="slabel">Create Invoice</div>
      <div className="api-block">
        <span className="method m-post">POST</span>
        <span style={{color:'#94a3b8'}}>/api/</span><span style={{color:'#7dd3fc'}}>create-invoice</span>
      </div>
      <table className="ptbl">
        <thead><tr><th>Parameter</th><th>Type</th><th>Required</th><th>Description</th></tr></thead>
        <tbody>
          <tr><td><span className="pk">api_key</span></td><td>String</td><td><span className="rb">Required</span></td><td>Your UNIO API key from Settings</td></tr>
          <tr><td><span className="pk">amount</span></td><td>Number</td><td><span className="rb">Required</span></td><td>Amount to collect in ₹ (min ₹1)</td></tr>
          <tr><td><span className="pk">order_id</span></td><td>String</td><td><span className="ob">Optional</span></td><td>Your custom order reference ID</td></tr>
          <tr><td><span className="pk">description</span></td><td>String</td><td><span className="ob">Optional</span></td><td>Payment note shown to payer</td></tr>
        </tbody>
      </table>

      <div className="slabel">Response</div>
      <div className="json-res">
        <span className="jb">{'{'}</span><br/>
        &nbsp;&nbsp;<span className="jk">"status"</span><span className="jp">: </span><span className="jv">"success"</span><span className="jp">,</span><br/>
        &nbsp;&nbsp;<span className="jk">"invoice_id"</span><span className="jp">: </span><span className="jv">"INV-XXXXXXXXXXXXXX"</span><span className="jp">,</span><br/>
        &nbsp;&nbsp;<span className="jk">"payment_url"</span><span className="jp">: </span><span className="jv">"https://unio-hazel.vercel.app/pay/INV-XXXX"</span><span className="jp">,</span><br/>
        &nbsp;&nbsp;<span className="jk">"expires_at"</span><span className="jp">: </span><span className="jv">"2026-04-13T12:30:00Z"</span><br/>
        <span className="jb">{'}'}</span>
      </div>

      <div className="slabel">Verify Invoice Status</div>
      <div className="api-block">
        <span className="method m-get">GET</span>
        <span style={{color:'#94a3b8'}}>/deposit-gateway/status/</span><span style={{color:'#7dd3fc'}}>{'{'}</span><span style={{color:'#fde68a'}}>invoice_id</span><span style={{color:'#7dd3fc'}}>{'}'}</span><span style={{color:'#94a3b8'}}>?key=</span><span style={{color:'#fde68a'}}>YOUR_API_KEY</span>
      </div>
      <table className="ptbl" style={{marginTop:'12px'}}>
        <thead><tr><th>Status</th><th>Meaning</th></tr></thead>
        <tbody>
          <tr><td><span className="pill-y">pending</span></td><td>Invoice is valid and awaiting payment</td></tr>
          <tr><td><span className="pill-g">paid</span></td><td>Payment successful — balance credited to your wallet</td></tr>
          <tr><td><span className="pill-r">expired</span></td><td>Invoice expired — valid for 30 minutes only</td></tr>
        </tbody>
      </table>

      <ul className="body" style={{marginTop:'16px'}}>
        <li>Payment is instant — no admin approval required.</li>
        <li>Both payer and receiver must have a UNIO Wallet account.</li>
        <li>Each invoice is valid for <strong style={{color:'var(--primary)'}}>30 minutes</strong> from creation. After expiry, create a new invoice.</li>
        <li>Zero fees on any payment collected via UNIO Gateway.</li>
        <li>Payer authenticates with mobile number, password, and 4-digit PIN.</li>
        <li>Paid invoices cannot be reused or re-attempted.</li>
      </ul>
      <div className="box box-blue" style={{marginTop:'14px'}}>
        <strong>💡 Tip:</strong> Poll <code style={{fontFamily:'monospace',fontSize:'.82rem'}}>/deposit-gateway/status/{"{invoice_id}"}</code> in your backend to confirm payment before delivering your product or service.
      </div>
    </>
  },
  {
    id:9, icon:"⚙️", title:"General API Usage",
    body: () => <>
      <p className="body">UNIO Wallet provides its own internal API for wallet operations. All API access is subject to the following rules:</p>
      <ul className="body">
        <li>API is available for all registered users via API Settings in the platform.</li>
        <li>API can be used for wallet-to-wallet transfers and payment collection.</li>
        <li>API keys must be kept private and must not be shared with anyone.</li>
        <li>API usage is monitored — any suspicious activity will result in immediate account suspension.</li>
        <li>UNIO Wallet is not responsible for losses caused by misuse or leakage of your API key.</li>
        <li>Unauthorized use of the API to manipulate balances is strictly prohibited.</li>
      </ul>
    </>
  },
  {
    id:10, icon:"🛡️", title:"Account Suspension Policy",
    body: () => <>
      <p className="body">UNIO Wallet reserves the right to suspend or permanently ban accounts under the following circumstances:</p>
      <ul className="body">
        <li>Fraudulent deposits or any attempt to deceive the platform admin.</li>
        <li>Multiple account creation to abuse bonuses.</li>
        <li>Misuse of API keys or attempting unauthorized access.</li>
        <li>Submitting fake gift codes or attempting code enumeration attacks.</li>
        <li>Any activity deemed harmful to the platform or other users.</li>
      </ul>
      <div className="box box-yellow">
        <strong>Notice:</strong> Suspended accounts are not entitled to any balance refund. All platform decisions are final.
      </div>
    </>
  },
  {
    id:11, icon:"🆘", title:"Support",
    body: () => <ul className="body">
      <li>Support is available via the Help section within the platform.</li>
      <li>For payment issues, wait 48 hours before contacting support.</li>
      <li>UNIO Wallet aims to resolve all issues as quickly as possible.</li>
      <li>For API-related issues, include your invoice ID and error response when contacting support.</li>
    </ul>
  },
  {
    id:12, icon:"⚠️", title:"Disclaimer",
    body: () => <>
      <p className="body">UNIO Wallet is an independent platform. We are not responsible for:</p>
      <ul className="body">
        <li>Any financial loss incurred through use of this platform.</li>
        <li>Server downtime caused by the hosting provider.</li>
        <li>Issues arising from misuse of the platform.</li>
      </ul>
      <p className="body" style={{marginTop:'12px'}}>By using UNIO Wallet, you agree to use the platform at your own risk and responsibility.</p>
    </>
  }
];

function Section({ s, delay }) {
  const Body = s.body;
  return (
    <div className="card" style={{animationDelay:`${delay}s`}}>
      <div className="card-title">
        <span className="num">{s.id}</span>
        <span className="icon-wrap">{s.icon}</span>
        {s.title}
      </div>
      <Body />
    </div>
  );
}

function App() {
  const [prog, setProg] = useState(0);
  useEffect(() => {
    const fn = () => {
      const el = document.documentElement;
      const tot = el.scrollHeight - el.clientHeight;
      setProg(tot > 0 ? (el.scrollTop / tot) * 100 : 0);
    };
    window.addEventListener('scroll', fn);
    return () => window.removeEventListener('scroll', fn);
  }, []);

  return <>
    <div className="pbar" style={{width:`${prog}%`}} />

    <header>
      <div className="h-logo">UNIO</div>
      <div className="h-sub">Secure Digital Wallet</div>
      <div className="h-badge">📄 Terms &amp; Conditions — April 2026</div>
    </header>

    <div className="wrap">

      {/* Intro card */}
      <div className="card" style={{textAlign:'center', padding:'32px 28px', animationDelay:'.12s'}}>
        <h1 style={{fontFamily:"'Sora',sans-serif", fontSize:'1.7rem', fontWeight:800, marginBottom:'10px', color:'var(--text)'}}>
          Terms &amp; Conditions
        </h1>
        <p style={{color:'var(--muted)', fontSize:'.91rem', lineHeight:1.75, maxWidth:'460px', margin:'0 auto'}}>
          Please read these terms carefully before using UNIO Wallet. By accessing the platform, you agree to be bound by all terms listed below.
        </p>
      </div>

      {/* TOC */}
      <div className="card toc-card" style={{animationDelay:'.2s'}}>
        <div className="card-title" style={{marginBottom:'14px'}}>
          <span className="icon-wrap">📋</span> Table of Contents
        </div>
        <div className="toc-grid">
          {sections.map(s => (
            <div key={s.id} className="toc-item">
              <span className="toc-n">{s.id}</span>
              <span>{s.icon} {s.title}</span>
            </div>
          ))}
        </div>
      </div>

      {/* Sections */}
      {sections.map((s, i) => (
        <Section key={s.id} s={s} delay={0.25 + i * 0.05} />
      ))}

      <div className="divider" />

      {/* AI Box */}
      <div className="ai-box">
        <div style={{display:'flex', alignItems:'center', gap:'16px'}}>
          <div className="ai-icon">🤖</div>
          <div>
            <div style={{fontFamily:"'Sora',sans-serif", fontSize:'1rem', fontWeight:700, color:'#fff', marginBottom:'4px'}}>
              Have Questions? Ask UNIO AI
            </div>
            <div style={{fontSize:'.82rem', color:'rgba(255,255,255,.72)', lineHeight:1.5}}>
              Get instant answers about payments, API, withdrawals &amp; more — available 24/7.
            </div>
          </div>
        </div>
        <a href="/ai" className="ai-btn">Talk to AI →</a>
      </div>

      <p className="footer">© 2026 UNIO Wallet. All rights reserved.</p>
    </div>
  </>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
