<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Withdraw | UNIO</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}

body {
  font-family:'Plus Jakarta Sans',sans-serif;
  background: linear-gradient(135deg, #e8eeff 0%, #f0f4ff 50%, #e4edff 100%);
  min-height:100vh;
  padding-bottom:80px;
  animation: bgPulse 6s ease-in-out infinite alternate;
}
@keyframes bgPulse {
  from { background: linear-gradient(135deg, #e8eeff, #f0f4ff, #e4edff); }
  to   { background: linear-gradient(135deg, #dce8ff, #eaf0ff, #d8e6ff); }
}

/* ── HEADER ── */
.header {
  background: white;
  padding: 1rem 1.25rem;
  display: flex;
  align-items: center;
  gap: 1rem;
  box-shadow: 0 2px 20px rgba(0,87,255,0.08);
  animation: slideDown 0.5s cubic-bezier(.22,1,.36,1);
}
@keyframes slideDown {
  from { transform: translateY(-100%); opacity: 0; }
  to   { transform: translateY(0);     opacity: 1; }
}

.back {
  width:36px; height:36px;
  background:#f8fafc;
  border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; text-decoration:none; color:#64748b;
  transition: all 0.2s;
}
.back:hover {
  background: #0057ff;
  color: white;
  transform: scale(1.1) rotate(-10deg);
  box-shadow: 0 4px 12px rgba(0,87,255,0.3);
}

.header h1 {
  font-size:1rem; font-weight:800; color:#0f172a;
  text-transform:uppercase; letter-spacing:.05em;
}

/* ── CONTAINER ── */
.container { max-width:480px; margin:0 auto; padding:1.25rem; }

/* ── BALANCE PILL ── */
.balance-pill {
  background: white;
  border-radius: 1rem;
  padding: .75rem 1.25rem;
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 1.25rem;
  box-shadow: 0 2px 15px rgba(0,87,255,0.08);
  animation: slideUp 0.5s 0.1s cubic-bezier(.22,1,.36,1) both;
  transition: transform 0.2s, box-shadow 0.2s;
}
.balance-pill:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(0,87,255,0.15);
}
.balance-pill span { font-size:.7rem; font-weight:700; color:#94a3b8; text-transform:uppercase; }
.balance-pill strong {
  font-size:1rem; font-weight:800; color:#0057ff;
  animation: countUp 0.8s 0.5s ease both;
}
@keyframes countUp {
  from { opacity:0; transform: scale(0.5); }
  to   { opacity:1; transform: scale(1); }
}

/* ── CARD ── */
.card {
  background: white;
  border-radius: 1.75rem;
  padding: 1.5rem;
  box-shadow: 0 2px 15px rgba(0,87,255,0.08);
  margin-bottom: 1.25rem;
  animation: slideUp 0.5s 0.2s cubic-bezier(.22,1,.36,1) both;
  transition: transform 0.3s, box-shadow 0.3s;
}
.card:hover {
  box-shadow: 0 12px 40px rgba(0,87,255,0.12);
}

@keyframes slideUp {
  from { transform: translateY(30px); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}

.card-title {
  font-size:.7rem; font-weight:800; color:#94a3b8;
  text-transform:uppercase; letter-spacing:.05em;
  margin-bottom:1.25rem;
  display: flex; align-items: center; gap: 6px;
}
.card-title i {
  color: #0057ff;
  animation: bounceArrow 1.5s ease-in-out infinite;
}
@keyframes bounceArrow {
  0%, 100% { transform: translateY(0); }
  50%       { transform: translateY(-4px); }
}

/* ── INPUT GROUP ── */
.input-group { margin-bottom:1.25rem; }
.input-group label {
  display:block; font-size:.7rem; font-weight:800;
  color:#94a3b8; text-transform:uppercase; letter-spacing:.05em;
  margin-bottom:.5rem; margin-left:.25rem;
  transition: color 0.2s;
}
.input-group:focus-within label { color: #0057ff; }

.input-group input {
  width:100%; padding:1rem 1.25rem;
  background:#f8fafc;
  border:2px solid #f1f5f9;
  border-radius:1rem;
  font-size:.9rem; font-weight:600;
  outline:none;
  transition: all 0.3s;
  font-family:inherit;
}
.input-group input:focus {
  border-color:#0057ff;
  background:white;
  box-shadow: 0 0 0 4px rgba(0,87,255,0.08);
  transform: scale(1.01);
}
.input-group input::placeholder { color: #cbd5e1; }

/* Input shake on error */
.input-group input.shake {
  animation: shake 0.4s ease;
  border-color: #dc2626;
}
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20%     { transform: translateX(-8px); }
  40%     { transform: translateX(8px); }
  60%     { transform: translateX(-5px); }
  80%     { transform: translateX(5px); }
}

/* ── MESSAGE ── */
.msg {
  padding:.75rem 1rem;
  border-radius:.75rem;
  font-size:.75rem; font-weight:700;
  text-align:center;
  margin-bottom:1rem;
  display:none;
}
.msg.error {
  background:#fee2e2; color:#dc2626; display:block;
  animation: shakeMsg 0.4s ease, fadeIn 0.3s ease;
}
.msg.success {
  background:#dcfce7; color:#16a34a; display:block;
  animation: popIn 0.4s cubic-bezier(.22,1,.36,1), fadeIn 0.3s ease;
}
@keyframes fadeIn  { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }
@keyframes popIn   { from { transform: scale(0.8); opacity:0; } to { transform: scale(1); opacity:1; } }
@keyframes shakeMsg {
  0%,100% { transform: translateX(0); }
  25%     { transform: translateX(-6px); }
  75%     { transform: translateX(6px); }
}

/* ── INFO BOX ── */
.info-box {
  background: linear-gradient(135deg, #eff6ff, #e8f0ff);
  border-radius:1rem; padding:1rem; margin-bottom:1.25rem;
  animation: fadeIn 0.5s 0.4s ease both;
  border: 1px solid rgba(0,87,255,0.08);
}
.info-row {
  display:flex; justify-content:space-between;
  font-size:.75rem; font-weight:600; color:#64748b;
  margin-bottom:.4rem;
  transition: transform 0.2s;
}
.info-row:last-child { margin-bottom:0; }
.info-row:hover { transform: translateX(4px); }
.info-row span:last-child { color:#0057ff; font-weight:700; }

/* ── BUTTON ── */
.btn {
  width:100%; padding:1rem;
  background: linear-gradient(135deg, #0057ff, #0040cc);
  color:white; border:none; border-radius:1rem;
  font-size:.85rem; font-weight:800;
  text-transform:uppercase; letter-spacing:.1em;
  cursor:pointer;
  transition: all 0.3s;
  font-family:inherit;
  display:flex; justify-content:center; align-items:center; gap:10px;
  box-shadow: 0 4px 15px rgba(0,87,255,0.3);
  position: relative;
  overflow: hidden;
}
.btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
  opacity: 0;
  transition: opacity 0.3s;
}
.btn:hover::after { opacity: 1; }
.btn:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(0,87,255,0.45);
}
.btn:active:not(:disabled) {
  transform: scale(.97) translateY(0);
  box-shadow: 0 2px 10px rgba(0,87,255,0.3);
}
.btn:disabled { background: linear-gradient(135deg, #94a3b8, #7a8fa8); cursor:not-allowed; box-shadow:none; }
.btn.success-pulse {
  background: linear-gradient(135deg, #16a34a, #15803d);
  animation: successPulse 0.5s ease;
}
@keyframes successPulse {
  0%   { transform: scale(1); }
  50%  { transform: scale(1.03); }
  100% { transform: scale(1); }
}

/* ── SPINNER ── */
.spinner {
  width:18px; height:18px;
  border:3px solid rgba(255,255,255,0.3);
  border-radius:50%; border-top-color:#fff;
  animation: spin 0.8s linear infinite;
  display:none;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── NOTE ── */
.note {
  background:#fff7ed; border:1px solid #fed7aa;
  border-radius:1rem; padding:1rem;
  font-size:.75rem; font-weight:600; color:#ea580c;
  margin-top:1rem;
  animation: wobble 3s 2s ease-in-out infinite;
  display: flex; align-items: flex-start; gap: 8px;
}
.note i { flex-shrink:0; margin-top:2px; animation: pulse 1.5s ease-in-out infinite; }
@keyframes pulse {
  0%,100% { opacity:1; transform: scale(1); }
  50%     { opacity:0.7; transform: scale(1.2); }
}
@keyframes wobble {
  0%,100% { transform: translateX(0); }
  15%     { transform: translateX(-3px) rotate(-0.5deg); }
  30%     { transform: translateX(3px) rotate(0.5deg); }
  45%     { transform: translateX(-2px); }
  60%     { transform: translateX(2px); }
  75%     { transform: translateX(0); }
}

/* ── BOTTOM NAV ── */
.bottom-nav {
  position:fixed; bottom:0; left:0; right:0;
  background:white;
  border-top:1px solid #f1f5f9;
  display:flex; justify-content:space-around;
  padding:.6rem 0; z-index:50;
  box-shadow: 0 -4px 20px rgba(0,87,255,0.06);
  animation: slideUp 0.5s 0.3s cubic-bezier(.22,1,.36,1) both;
}
.nav-item {
  display:flex; flex-direction:column; align-items:center; gap:3px;
  color:#94a3b8; font-size:.6rem; font-weight:700; text-transform:uppercase;
  cursor:pointer; text-decoration:none; flex:1;
  transition: all 0.2s;
  padding: 4px 0;
}
.nav-item i { font-size:1.2rem; transition: transform 0.2s; }
.nav-item:hover { color: #0057ff; }
.nav-item:hover i { transform: translateY(-3px) scale(1.1); }
.nav-item.active {
  color:#0057ff;
  position: relative;
}
.nav-item.active::before {
  content:'';
  position:absolute; top:-1px; left:50%; transform:translateX(-50%);
  width:30px; height:3px;
  background: #0057ff;
  border-radius:0 0 4px 4px;
  animation: slideDown 0.3s ease;
}
.nav-item.active i { animation: navBounce 0.4s ease; }
@keyframes navBounce {
  0%,100% { transform: translateY(0); }
  50%     { transform: translateY(-5px); }
}

/* ── FLOATING PARTICLES ── */
.particles-bg {
  position: fixed; inset: 0;
  pointer-events: none; z-index: 0; overflow: hidden;
}
.particle {
  position: absolute;
  border-radius: 50%;
  background: rgba(0, 87, 255, 0.08);
  animation: floatUp linear infinite;
}
@keyframes floatUp {
  from { transform: translateY(100vh) scale(0); opacity:0; }
  10%  { opacity:1; }
  90%  { opacity:0.5; }
  to   { transform: translateY(-10vh) scale(1); opacity:0; }
}

/* ── RIPPLE ON BUTTON ── */
.ripple-effect {
  position:absolute; border-radius:50%;
  background: rgba(255,255,255,0.4);
  transform: scale(0);
  animation: rippleBtn 0.6s ease-out forwards;
  pointer-events:none;
}
@keyframes rippleBtn {
  to { transform: scale(4); opacity:0; }
}
</style>
</head>
<body>

<!-- Floating particles background -->
<div class="particles-bg" id="particlesBg"></div>

<div class="header">
  <a href="dashboard.html" class="back"><i class="fa-solid fa-arrow-left"></i></a>
  <h1>Withdraw</h1>
</div>

<div class="container">

  <div class="balance-pill">
    <span>Available Balance</span>
    <strong>₹<span id="balance">0.00</span></strong>
  </div>

  <div class="card">
    <div class="card-title">
      <i class="fa-solid fa-arrow-up"></i> Withdraw Funds
    </div>

    <div id="msg" class="msg"></div>

    <div class="input-group">
      <label>UPI ID</label>
      <input type="text" id="upi" placeholder="yourname@upi">
    </div>

    <div class="input-group">
      <label>Amount (₹)</label>
      <input type="number" id="amount" placeholder="Minimum ₹10" step="0.01">
    </div>

    <div class="info-box">
      <div class="info-row"><span>Minimum Withdrawal</span><span>₹10</span></div>
      <div class="info-row"><span>Processing Time</span><span>Within 24 hours</span></div>
      <div class="info-row"><span>Withdrawal Fee</span><span>₹0 (FREE)</span></div>
    </div>

    <button class="btn" id="withdraw-btn" onclick="withdraw(event)">
      <div class="spinner" id="btn-spinner"></div>
      <span id="btn-text"><i class="fa-solid fa-arrow-up"></i> Request Payout</span>
    </button>

    <div class="note">
      <i class="fa-solid fa-triangle-exclamation"></i>
      <span>Withdraw request admin ke paas jayegi — 24 ghante mein process hogi!</span>
    </div>
  </div>

</div>

<div class="bottom-nav">
  <a href="dashboard.html" class="nav-item"><i class="fa-solid fa-house"></i>Home</a>
  <a href="transfer.html" class="nav-item"><i class="fa-solid fa-paper-plane"></i>Send</a>
  <a href="deposit.html" class="nav-item"><i class="fa-solid fa-plus-circle"></i>Add</a>
  <a href="withdraw.html" class="nav-item active"><i class="fa-solid fa-arrow-up"></i>Withdraw</a>
  <a href="lifafa.html" class="nav-item"><i class="fa-solid fa-envelope-open-text"></i>Lifafa</a>
</div>

<script>
const API = '';
const token = localStorage.getItem('token');
if(!token) window.location.href = 'index.html';

// ── Floating Particles Background ──
(function spawnParticles() {
  const bg = document.getElementById('particlesBg');
  for(let i = 0; i < 12; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 40 + 10;
    p.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%;
      animation-duration:${Math.random()*12+8}s;
      animation-delay:${Math.random()*10}s;
    `;
    bg.appendChild(p);
  }
})();

// ── Balance Load with count-up animation ──
fetch(API+'/wallet/balance',{headers:{'Authorization':'Bearer '+token}})
  .then(r=>r.json()).then(d=>{
    if(d.status==='success') {
      const target = parseFloat(d.balance);
      let current = 0;
      const el = document.getElementById('balance');
      const step = target / 30;
      const timer = setInterval(() => {
        current = Math.min(current + step, target);
        el.textContent = current.toFixed(2);
        if(current >= target) clearInterval(timer);
      }, 30);
    }
  }).catch(()=>{});

// ── Show Message ──
function showMsg(text, type) {
  const m = document.getElementById('msg');
  m.textContent = text;
  m.className = 'msg';
  m.style.display = 'none';
  void m.offsetWidth; // reflow to restart animation
  m.className = 'msg ' + type;
}

// ── Input Shake ──
function shakeInput(id) {
  const el = document.getElementById(id);
  el.classList.remove('shake');
  void el.offsetWidth;
  el.classList.add('shake');
  setTimeout(()=> el.classList.remove('shake'), 500);
}

// ── Button Ripple ──
function addRipple(btn, e) {
  const rect = btn.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const ripple = document.createElement('span');
  ripple.className = 'ripple-effect';
  ripple.style.cssText = `left:${x-20}px; top:${y-20}px; width:40px; height:40px;`;
  btn.appendChild(ripple);
  setTimeout(()=> ripple.remove(), 600);
}

// ── Withdraw Function ──
async function withdraw(e) {
  const upi    = document.getElementById('upi').value.trim();
  const amount = document.getElementById('amount').value;
  const btn    = document.getElementById('withdraw-btn');
  const spinner = document.getElementById('btn-spinner');
  const btnText = document.getElementById('btn-text');

  if(e) addRipple(btn, e);

  if(!upi)   { shakeInput('upi');    return showMsg('UPI ID required!', 'error'); }
  if(!amount){ shakeInput('amount'); return showMsg('Amount required!', 'error'); }
  if(parseFloat(amount) < 10){ shakeInput('amount'); return showMsg('Minimum withdrawal is ₹10!', 'error'); }

  btn.disabled = true;
  spinner.style.display = 'block';
  btnText.innerHTML = 'Processing...';

  try {
    const r = await fetch(API+'/wallet/withdraw', {
      method: 'POST',
      headers: {'Content-Type':'application/json','Authorization':'Bearer '+token},
      body: JSON.stringify({ upi, amount })
    });
    const d = await r.json();
    if(d.status === 'success') {
      showMsg('✅ Withdraw request submitted! Admin will process within 24 hours.', 'success');
      btn.classList.add('success-pulse');
      document.getElementById('upi').value = '';
      document.getElementById('amount').value = '';

      fetch(API+'/wallet/balance',{headers:{'Authorization':'Bearer '+token}})
        .then(r=>r.json()).then(d=>{
          if(d.status==='success') document.getElementById('balance').textContent=parseFloat(d.balance).toFixed(2);
        });
    } else {
      showMsg(d.message || 'Request failed!', 'error');
      btn.classList.remove('success-pulse');
    }
  } catch(err) {
    showMsg('Server error! Try again.', 'error');
  }

  btn.disabled = false;
  spinner.style.display = 'none';
  btnText.innerHTML = '<i class="fa-solid fa-arrow-up"></i> Request Payout';
}
</script>

<footer style="text-align:center;padding:10px;font-size:0.7rem;color:#94a3b8;font-weight:700;text-transform:uppercase;position:relative;z-index:1;">
  powered by unio hazel
</footer>

</body>
</html>
